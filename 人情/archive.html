<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>礼金归档库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;background:#f5f4f0;color:#2c3e50;min-height:100vh;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);padding-top:env(safe-area-inset-top);padding-bottom:calc(16px + env(safe-area-inset-bottom))}
body.modal-open{overflow:hidden;position:fixed;width:100%}
/* 顶部导航 */
header{background:#fff;border-bottom:1px solid #e0dbd0;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:600;letter-spacing:2px;color:#2c3e50}
nav{display:flex;gap:0}
nav a,nav button{padding:14px 20px;border:none;background:none;font-size:14px;color:#7f8c8d;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-family:inherit;text-decoration:none}
nav a:hover,nav button:hover{color:#2c3e50;background:#fafaf8}
/* 主容器 */
main{max-width:1100px;margin:0 auto;padding:24px 20px}
/* 卡片 */
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #eae6dd}
.card-title{font-size:15px;font-weight:600;color:#2c3e50;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #eae6dd;display:flex;justify-content:space-between;align-items:center;gap:8px}
#evtDetail .card-title > span:first-child{min-width:0;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-title .btn-group{flex-shrink:0}
/* 按钮 */
.btn{padding:8px 16px;border:1px solid #d5cfc5;border-radius:6px;font-size:13px;cursor:pointer;background:#fff;color:#2c3e50;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f4f0;border-color:#b0a89a}
.btn.primary{background:#2c3e50;color:#fff;border-color:#2c3e50}
.btn.primary:hover{background:#3d5063}
.btn.danger{color:#c0392b;border-color:#e0cfcf}
.btn.danger:hover{background:#fdf2f2}
.btn.sm{padding:4px 10px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
/* 表单 */
.fgroup{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fgroup input,.fgroup select{padding:8px 12px;border:1px solid #d5cfc5;border-radius:6px;font-size:13px;font-family:inherit;color:#2c3e50;background:#fafaf8;min-width:0}
.fgroup input:focus,.fgroup select:focus{outline:none;border-color:#2c3e50;background:#fff}
.fgroup input[type="date"]{width:138px}
/* 表格 */
.t-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
table thead th{padding:10px 12px;text-align:left;font-size:12px;color:#7f8c8d;border-bottom:2px solid #eae6dd;white-space:nowrap;font-weight:500}
table tbody td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f0ede5;vertical-align:middle}
table tbody tr:hover{background:#fafaf8}
table tbody tr.row-locked{opacity:.6}
td.amt{font-weight:600;color:#2c3e50}
td.num{text-align:right}
td.act{white-space:nowrap}
/* 事件选择器 */
.evt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.evt-item{padding:14px;background:#fff;border:1px solid #eae6dd;border-radius:8px;cursor:pointer;transition:all .15s}
.evt-item:hover{border-color:#2c3e50;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.evt-item.selected{border-color:#2c3e50;background:#fafaf8}
.evt-item .ename{font-size:14px;font-weight:600;margin-bottom:4px}
.evt-item .emeta{font-size:12px;color:#7f8c8d;display:flex;gap:12px}
.evt-item .etotal{font-size:16px;font-weight:700;color:#2c3e50;margin-top:6px}
/* 页导航 */
.batch-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.batch-bar span{padding:6px 12px;background:#f5f4f0;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.batch-bar span:hover{border-color:#d5cfc5}
.batch-bar span.on{background:#2c3e50;color:#fff;font-weight:600}
/* 礼薄页面 */
.gift-page{background:#fff;border:1px solid #eae6dd;border-radius:8px;overflow:hidden}
.gift-page .page-header{background:#fafaf8;padding:10px 16px;font-size:13px;color:#7f8c8d;border-bottom:1px solid #eae6dd;display:flex;justify-content:space-between;align-items:center}
.gift-page table thead th{background:#fafaf8}
/* 可编辑录入表单 */
.page-form table td{padding:4px 8px}
.page-form input{width:100%;padding:6px 8px;border:1px solid #e0dbd0;border-radius:4px;font-size:13px;font-family:inherit;color:#2c3e50;background:#fdfdfc}
.page-form input:focus{outline:none;border-color:#2c3e50;background:#fff;box-shadow:0 0 0 2px rgba(44,62,80,.1)}
.page-form input::placeholder{color:#ccc}
.row-empty td{background:#fefefe}
/* 模糊搜索下拉 */
.ac-dd{position:fixed;z-index:300;background:#fff;border:1px solid #d5cfc5;border-radius:6px;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);display:none}
.ac-dd.show{display:block}
.ac-dd .ac-item{padding:8px 12px;font-size:13px;cursor:pointer;color:#2c3e50;white-space:nowrap}
.ac-dd .ac-item:hover,.ac-dd .ac-item.active{background:#f5f4f0}
/* 数据卡片 */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid #eae6dd;border-radius:8px;padding:16px;text-align:center}
.stat-card .slabel{font-size:12px;color:#7f8c8d;margin-bottom:6px}
.stat-card .svalue{font-size:24px;font-weight:700;color:#2c3e50}
.stat-card.sub .svalue{font-size:18px;color:#7f8c8d}
/* 弹窗 */
.modal-mask{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.25);z-index:200;justify-content:center;align-items:center}
.modal-mask.show{display:flex}
.modal-box{background:#fff;border-radius:10px;padding:24px;min-width:360px;max-width:500px;box-shadow:0 8px 30px rgba(0,0,0,.15);border:1px solid #eae6dd}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#2c3e50}
.modal-box .fgroup{margin-bottom:12px;display:flex;flex-direction:column;align-items:stretch;gap:0}
.modal-box .fgroup label{font-size:12px;color:#7f8c8d;margin-bottom:4px}
.modal-box .fgroup input,.modal-box .fgroup select{width:100%}
.modal-box .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* 提示 */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;background:#2c3e50;color:#fff;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;width:max-content;max-width:90vw}
.toast.show{opacity:1}
.toast.err{background:#c0392b}
/* 空状态 */
.empty-hint{grid-column:1/-1;text-align:center;padding:40px 20px;color:#999;font-size:14px}
/* 移动端 */
@media(max-width:768px){
  body{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
  header{flex-direction:column;height:auto;padding:8px 10px;gap:6px}
  header h1{font-size:16px;letter-spacing:1px}
  nav{display:flex}
  nav a,nav button{padding:10px 14px;font-size:13px}
  main{padding:12px 8px;max-width:100%}
  .card{padding:12px;margin-bottom:10px;border-radius:6px}
  .fgroup{flex-direction:column;align-items:stretch;gap:8px}
  .fgroup input,.fgroup select,.fgroup .btn{width:100%!important;max-width:none!important;min-width:0!important;box-sizing:border-box!important}
  .fgroup input,.fgroup select{padding:10px 12px;font-size:16px}
  .btn{padding:8px 14px;font-size:14px}
  .btn.sm{padding:6px 10px;font-size:13px}
  .btn-group{gap:6px}
  .stat-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:12px 8px}
  .stat-card .svalue{font-size:20px}
  .stat-card.sub .svalue{font-size:16px}
  .evt-grid{grid-template-columns:1fr;gap:8px}
  .evt-item{padding:12px}
  #evtDetail .card-title{flex-direction:column;align-items:stretch;gap:8px}
  #evtDetail .card-title > span:first-child{white-space:normal;overflow:visible;text-overflow:clip}
  #evtDetail .card-title .btn-group{justify-content:flex-end;flex-shrink:1}
  #evtDetail .card-title .btn-group .btn{height:38px;min-width:44px;font-size:13px}
  .t-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
  table{font-size:13px;min-width:500px}
  table thead th{padding:8px 8px;font-size:11px}
  table tbody td{padding:7px 8px;font-size:12px}
  .gift-page{border-radius:6px}
  .gift-page .page-header{flex-wrap:wrap;gap:6px;padding:8px 10px;font-size:12px}
  .page-form{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .page-form table{min-width:350px;table-layout:fixed;width:100%}
  .page-form table thead th{font-size:11px;padding:6px 4px}
  .page-form table tbody td{padding:4px 4px}
  .page-form table th:nth-child(1){width:30px}
  .page-form table th:nth-child(2){width:32%}
  .page-form table th:nth-child(3){width:24%}
  .page-form table th:nth-child(4){width:auto}
  .page-form table th:nth-child(5){width:34px}
  .page-form input{padding:8px 4px;font-size:16px;width:100%!important;box-sizing:border-box!important}
  .page-form .btn.sm{padding:4px 6px;font-size:12px;min-width:28px}
  .batch-bar{gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .batch-bar span{padding:5px 8px;font-size:12px;white-space:nowrap;flex-shrink:0}
  .modal-box{min-width:0;width:92vw;max-width:92vw;padding:16px;margin:0 auto;border-radius:8px}
  .modal-mask{padding:10px}
  .modal-box h3{font-size:15px;margin-bottom:12px}
  .modal-box .fgroup{margin-bottom:10px}
  .modal-box .fgroup label{font-size:11px}
  .modal-box .fgroup input,.modal-box .fgroup select{padding:10px 12px;font-size:16px}
  .modal-box .btn-row{flex-direction:column-reverse;gap:8px}
  .modal-box .btn-row .btn{width:100%;padding:12px;font-size:15px;text-align:center;height:46px}
  .toast{top:auto;max-width:90vw;padding:10px 18px;font-size:13px;bottom:calc(20px + env(safe-area-inset-bottom))}
}
@media(min-width:769px){
  main{max-width:1100px;margin:0 auto;padding:16px 24px}
  body{background:#eef1f5}
}
</style>
</head>
<body>

<header>
  <h1>礼金归档库</h1>
  <nav>
    <a href="/renqing">返回工作台</a>
  </nav>
</header>

<main>
  <!-- 已归档事件列表 -->
  <div class="card" id="archivedCard">
    <div class="card-title">已归档事件</div>
    <div class="evt-grid" id="evtGrid"></div>
  </div>

  <!-- 选中事件的详情 -->
  <div id="evtDetail" style="display:none">
    <div class="card">
      <div class="card-title">
        <span id="evtTitle"></span>
        <div class="btn-group">
          <button class="btn sm" id="evtArchiveBtn" onclick="toggleArchive()">取消归档</button>
          <button class="btn sm" id="evtLockBtn" onclick="toggleLock()">锁定</button>
          <button class="btn sm" onclick="editEvt()">编辑事件</button>
          <button class="btn sm danger" onclick="deleteEvt()">删除</button>
        </div>
      </div>
      <div class="stat-row" id="evtStats"></div>
      <div class="batch-bar" id="batchNav"></div>
      <div class="gift-page" id="giftPage"></div>
    </div>
  </div>

  <!-- 日常随礼归档 -->
  <div class="card" id="dailyArchiveCard">
    <div class="card-title">
      <span>日常随礼归档 <span id="dailyYearTitle" style="font-size:12px;color:#999"></span></span>
      <span class="btn-group" id="dailyArchiveNav"></span>
    </div>
    <div id="dailyArchiveContent">
      <div class="evt-grid" id="dailyYearGrid"></div>
    </div>
  </div>

</main>

<!-- 弹窗 -->
<div class="modal-mask" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<script>
const API='/api/renqing';
const $=id=>document.getElementById(id);

// ==================== 工具函数 ====================
function escH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtD(d){return d||'-';}
function fmtA(v){return (v||0).toLocaleString();}
function evtTypeLabel(t){const m={丧事:'白事'};return m[t]||t;}

let toastTimer;
function toast(msg,isErr){
  const t=$('toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',1800);
}

// ==================== 模糊搜索联想 ====================
let acDrops=[];
function acCleanAll(){acDrops.forEach(d=>{if(d.parentNode)d.parentNode.removeChild(d);});acDrops=[];}

function acAttach(input){
  if(input.dataset.acAttached)return;
  input.dataset.acAttached='1';
  const dd=document.createElement('div');dd.className='ac-dd';
  document.body.appendChild(dd);acDrops.push(dd);
  let items=[],idx=-1,timer,blurTimer,ctrl,picking=false;

  function hide(){
    clearTimeout(blurTimer);blurTimer=null;
    dd.classList.remove('show');idx=-1;
  }

  function pick(i){
    if(!items[i])return;
    picking=true;
    input.value=items[i];
    hide();
    input.focus();
    input.dispatchEvent(new Event('input',{bubbles:true}));
    picking=false;
  }

  function render(){
    dd.innerHTML=items.map((n,ii)=>`<div class="ac-item" data-i="${ii}">${escH(n)}</div>`).join('');
    dd.querySelectorAll('.ac-item').forEach(el=>{
      el.addEventListener('mousedown',e=>{e.preventDefault();pick(parseInt(el.dataset.i));});
    });
  }

  function highlight(){
    dd.querySelectorAll('.ac-item').forEach((el,ii)=>el.classList.toggle('active',ii===idx));
  }

  function show(){
    try{
      if(!input.isConnected)return;
      const r=input.getBoundingClientRect();
      dd.style.top=(r.bottom+2)+'px';dd.style.left=r.left+'px';dd.style.minWidth=r.width+'px';
      render();dd.classList.add('show');
    }catch(e){}
  }

  input.addEventListener('input',()=>{
    if(picking)return;
    clearTimeout(timer);clearTimeout(blurTimer);blurTimer=null;idx=-1;
    const q=input.value.trim();
    if(!q){hide();return;}
    if(ctrl){ctrl.abort();}
    ctrl=new AbortController();
    timer=setTimeout(async()=>{
      try{
        const res=await fetch(API+'/suggestions?q='+encodeURIComponent(q),{signal:ctrl.signal});
        items=await res.json();
      }catch(e){return;}
      if(!Array.isArray(items)||items.length===0||document.activeElement!==input||!input.isConnected){hide();return;}
      show();
    },150);
  });

  input.addEventListener('keydown',e=>{
    if(!dd.classList.contains('show'))return;
    if(e.key==='ArrowDown'){e.preventDefault();idx=(idx+1)%items.length;highlight();}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=(idx-1+items.length)%items.length;highlight();}
    else if(e.key==='Enter'||e.key===' '||e.code==='Space'){e.preventDefault();e.stopPropagation();if(idx<0)idx=0;pick(idx);}
    else if(e.key==='Escape'){e.preventDefault();hide();}
  });

  input.addEventListener('blur',()=>{
    clearTimeout(blurTimer);blurTimer=null;
    blurTimer=setTimeout(()=>hide(),200);
  });
}

// ==================== 弹窗 ====================
function showModal(html){
  $('modalBox').innerHTML=html;$('modal').classList.add('show');
  document.body.classList.add('modal-open');
  setTimeout(()=>{
    const firstInp=$('modalBox').querySelector('input,select');
    if(firstInp)firstInp.focus();
  },100);
}
function hideModal(){
  $('modal').classList.remove('show');
  document.body.classList.remove('modal-open');
}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))hideModal();});

function showConfirm(msg, onOk){
  showModal(`<h3>${msg}</h3>
    <div class="btn-row" style="justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="hideModal()">取消</button>
      <button class="btn danger" id="confirmOkBtn">确定</button>
    </div>`);
  setTimeout(()=>{
    const btn=$('confirmOkBtn');
    if(btn){btn.addEventListener('click',()=>{hideModal();onOk();},{once:true});}
    btn&&btn.focus();
  },50);
}

// ==================== 事件收礼（归档库专用） ====================
let events=[],unarchivedEvts=[],selEvtId=null,selBatch=null,evtRecords=[],_gotoBatch=null,isUnarchivedMode=false;

async function loadEvents(){
  try{
    const allEvts=await fetch(API+'/events').then(r=>r.json());
    const nonDaily=allEvts.filter(e=>e.event_type!=='日常');
    events=nonDaily.filter(e=>e.archived);
    unarchivedEvts=nonDaily.filter(e=>!e.archived);
    renderEvtGrid();
    if(!selEvtId) return;
    const stillExists=events.find(e=>e.id===selEvtId);
    if(stillExists)loadEventDetail();
    else{$('evtDetail').style.display='none';selEvtId=null;}
  }catch(e){toast('加载事件列表失败',1);}
}

function renderEvtGrid(){
  $('evtGrid').innerHTML=events.length?events.map(e=>`<div class="evt-item${e.id===selEvtId?' selected':''}${e.locked?' row-locked':''}" onclick="selectEvent(${e.id})">
    <div class="ename">${escH(e.name)}${e.locked?' <span style="font-size:11px;color:#c0392b">[锁定]</span>':''}</div>
    <div class="emeta"><span>${escH(evtTypeLabel(e.event_type))}</span>${e.event_date?`<span>${e.event_date}</span>`:''}<span>${e.record_count}条</span></div>
    <div class="etotal">${fmtA(e.total_amount)} 元</div>
  </div>`).join(''):'<div class="empty-hint">暂无已归档事件</div>';
}

async function selectEvent(eid){
  selEvtId=eid;selBatch=null;
  $('evtDetail').style.display='block';
  renderEvtGrid();
  loadEventDetail();
}

async function loadEventDetail(){
  const evt=events.find(e=>e.id===selEvtId);if(!evt)return;
  $('evtTitle').innerHTML=`${escH(evt.name)} <span style="font-size:12px;color:#999">(${escH(evtTypeLabel(evt.event_type))}${evt.event_date?' | '+evt.event_date:''})</span>`;
  $('evtLockBtn').textContent=evt.locked?'解锁':'锁定';
  $('evtArchiveBtn').textContent='取消归档';

  const [recs, allEvts]=await Promise.all([
    fetch(API+'/records?event_id='+selEvtId).then(r=>r.json()),
    fetch(API+'/events').then(r=>r.json())
  ]);
  evtRecords=recs;
  const nonDaily=allEvts.filter(e=>e.event_type!=='日常');
  events=nonDaily.filter(e=>e.archived);
  unarchivedEvts=nonDaily.filter(e=>!e.archived);
  renderEvtGrid();
  const refreshed=events.find(e=>e.id===selEvtId);

  const total=evtRecords.reduce((s,r)=>s+(r.amount||0),0);
  const isDaily=(refreshed||evt).event_type==='日常'||(refreshed||evt).name==='流水';
  $('evtStats').innerHTML=`
    <div class="stat-card"><div class="slabel">${isDaily?'送出总额':'收到总额'}</div><div class="svalue">${fmtA(total)} 元</div></div>
    <div class="stat-card sub"><div class="slabel">记录数</div><div class="svalue">${evtRecords.length} 条</div></div>
    <div class="stat-card sub"><div class="slabel">涉及人数</div><div class="svalue">${new Set(evtRecords.map(r=>r.name)).size} 人</div></div>
    <div class="stat-card sub"><div class="slabel">页数</div><div class="svalue">${new Set(evtRecords.map(r=>r.batch)).size}</div></div>`;

  const batches=[...new Set(evtRecords.map(r=>r.batch))].sort((a,b)=>a-b);
  if(_gotoBatch!==null){selBatch=_gotoBatch;_gotoBatch=null;}
  else if(!selBatch||!batches.includes(selBatch))selBatch=batches[batches.length-1]||1;
  const ps=(refreshed||evt).page_size||12;
  $('batchNav').innerHTML=batches.length?batches.map(b=>{
    const br=evtRecords.filter(r=>r.batch===b);
    const bTotal=br.reduce((s,r)=>s+(r.amount||0),0);
    return `<span class="${b===selBatch?'on':''}" onclick="selBatch=${b};renderBatchPage()">第${b}页 ${br.length}/${ps} · ${fmtA(bTotal)}</span>`;
  }).join(''):'<span style="color:#999">暂无记录</span>';

  renderBatchPage();
}

function renderBatchPage(){
  acCleanAll();
  if(!selBatch){$('giftPage').innerHTML='<div style="text-align:center;padding:40px;color:#999">选择页面查看</div>';return;}
  const batchRecs=evtRecords.filter(r=>r.batch===selBatch);
  const sorted=batchRecs.sort((a,b)=>a.id-b.id);
  const evt=events.find(e=>e.id===selEvtId);
  const ps=evt?evt.page_size||12:12;
  const locked=evt&&evt.locked;
  const total=sorted.reduce((s,r)=>s+(r.amount||0),0);

  let html=`<div class="page-header"><span>第 ${selBatch} 页&nbsp;·&nbsp;${sorted.length}/${ps} 条 · ${fmtA(total)} 元</span>`;
  if(!locked){html+=`<span class="btn-group"><button class="btn primary sm" onclick="savePage()">保存</button></span>`;}
  html+=`</div>`;

  if(locked){
    html+=`<div class="t-wrap"><table><thead><tr><th style="width:40px">序号</th><th>姓名</th><th style="width:100px">金额</th><th>备注</th><th style="width:80px">操作</th></tr></thead><tbody>`;
    for(let i=0;i<ps;i++){
      const r=sorted[i];
      if(r){
        html+=`<tr><td class="num" style="color:#999">${i+1}</td><td>${escH(r.name)}</td><td class="amt num">${fmtA(r.amount)}</td><td style="color:#999">${escH(r.note||'')}</td><td></td></tr>`;
      }else{
        html+=`<tr style="color:#ccc"><td class="num">${i+1}</td><td>---</td><td class="num">---</td><td>---</td><td></td></tr>`;
      }
    }
    html+=`</tbody></table></div>`;
  }else{
    html+=`<div class="page-form" id="pageForm"><table><thead><tr><th style="width:40px">序号</th><th style="width:140px">姓名</th><th style="width:120px">金额</th><th>备注</th><th style="width:60px"></th></tr></thead><tbody>`;
    for(let i=0;i<ps;i++){
      const r=sorted[i];
      const nk=`pn_${i}`;const ak=`pa_${i}`;const ntk=`pnt_${i}`;
      html+=`<tr ${r?'':'class="row-empty"'}>
        <td class="num" style="color:#999">${i+1}</td>
        <td><input type="text" id="${nk}" value="${r?escH(r.name):''}" class="pi-name" data-idx="${i}" data-rid="${r?r.id:''}"></td>
        <td><input type="number" id="${ak}" value="${r?r.amount:''}" step="0.01" class="pi-amt" data-idx="${i}"></td>
        <td><input type="text" id="${ntk}" value="${r?escH(r.note||''):''}" class="pi-note" data-idx="${i}"></td>
        <td>${r?`<button class="btn sm danger" onclick="delRec(${r.id})">删除</button>`:''}</td>
      </tr>`;
    }
    html+=`</tbody></table></div>`;
  }
  $('giftPage').innerHTML=html;
  if(!locked){
    setTimeout(()=>{
      const inputs=$('pageForm').querySelectorAll('input');
      inputs.forEach((inp,i)=>{
        inp.addEventListener('keydown',(e)=>{
          if(e.key==='Enter'){
            if(document.querySelector('.ac-dd.show'))return;
            e.preventDefault();
            if(i+1<inputs.length){inputs[i+1].focus();}
            else{savePage(true);}
          }
        });
      });
      document.querySelectorAll('.pi-name').forEach(inp=>acAttach(inp));
    },50);
  }
}

async function loadEvtDataSilent(){
  try{
    evtRecords=await fetch(API+'/records?event_id='+selEvtId).then(r=>r.json());
    const allEvts=await fetch(API+'/events').then(r=>r.json());
    const nonDaily=allEvts.filter(e=>e.event_type!=='日常');
    events=nonDaily.filter(e=>e.archived);
    unarchivedEvts=nonDaily.filter(e=>!e.archived);
    renderEvtGrid();
    const evt=events.find(e=>e.id===selEvtId);
    if(evt){
      const total=evtRecords.reduce((s,r)=>s+(r.amount||0),0);
      const isDaily=evt.event_type==='日常'||evt.name==='流水';
      $('evtStats').innerHTML=`
        <div class="stat-card"><div class="slabel">${isDaily?'送出总额':'收到总额'}</div><div class="svalue">${fmtA(total)} 元</div></div>
        <div class="stat-card sub"><div class="slabel">记录数</div><div class="svalue">${evtRecords.length} 条</div></div>
        <div class="stat-card sub"><div class="slabel">涉及人数</div><div class="svalue">${new Set(evtRecords.map(r=>r.name)).size} 人</div></div>
        <div class="stat-card sub"><div class="slabel">页数</div><div class="svalue">${new Set(evtRecords.map(r=>r.batch)).size}</div></div>`;
      $('evtLockBtn').textContent=evt.locked?'解锁':'锁定';
      $('evtArchiveBtn').textContent='取消归档';
      const batches=[...new Set(evtRecords.map(r=>r.batch))].sort((a,b)=>a-b);
      if(!batches.includes(selBatch))selBatch=batches[batches.length-1]||1;
      const ps=evt.page_size||12;
      $('batchNav').innerHTML=batches.length?batches.map(b=>{
        const br=evtRecords.filter(r=>r.batch===b);
        const bTotal=br.reduce((s,r)=>s+(r.amount||0),0);
        return `<span class="${b===selBatch?'on':''}" onclick="selBatch=${b};renderBatchPage()">第${b}页 ${br.length}/${ps} · ${fmtA(bTotal)}</span>`;
      }).join(''):'<span style="color:#999">暂无记录</span>';
    }
  }catch(e){}
}

async function savePage(silent=false){
  const inputs=$('pageForm').querySelectorAll('input');
  const rows=[];
  for(let i=0;i<inputs.length;i+=3){
    const nameInp=inputs[i],amtInp=inputs[i+1],noteInp=inputs[i+2];
    const name=nameInp.value.trim();
    const amt=parseFloat(amtInp.value);
    if(!name||!amt||amt<=0)continue;
    rows.push({rid:parseInt(nameInp.dataset.rid)||0,name,amount:amt,note:noteInp.value.trim()});
  }
  if(rows.length===0){if(!silent)toast('请至少填写一条完整记录',1);return;}

  const evt=events.find(e=>e.id===selEvtId);
  const defaultDate=evt&&evt.event_date?evt.event_date:'';
  const results=await Promise.allSettled(rows.map(r=>{
    const body={event_id:selEvtId,name:r.name,amount:r.amount,note:r.note,direction:'收',batch:selBatch,date:defaultDate};
    const url=r.rid?API+'/records/'+r.rid:API+'/records';
    const method=r.rid?'PUT':'POST';
    return fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }));
  const okCount=results.filter(r=>r.status==='fulfilled'&&r.value.success).length;
  const errCount=results.length-okCount;
  if(!silent)toast(`保存完成: ${okCount}条成功${errCount>0?`, ${errCount}条失败`:''}`,errCount>0?1:0);
  await loadEvtDataSilent();
  renderBatchPage();
}

async function toggleLock(){
  const res=await fetch(API+'/events/'+selEvtId+'/lock',{method:'POST'});
  if(res.ok){
    toast('已切换锁定状态');
    const allEvts=await fetch(API+'/events').then(r=>r.json());
    const nonDaily=allEvts.filter(e=>e.event_type!=='日常');
    events=nonDaily.filter(e=>e.archived);
    unarchivedEvts=nonDaily.filter(e=>!e.archived);
    renderEvtGrid();
    const evt=events.find(e=>e.id===selEvtId);
    if(evt){
      $('evtLockBtn').textContent=evt.locked?'解锁':'锁定';
      evtRecords=await fetch(API+'/records?event_id='+selEvtId).then(r=>r.json());
      $('evtTitle').innerHTML=`${escH(evt.name)} <span style="font-size:12px;color:#999">(${escH(evtTypeLabel(evt.event_type))}${evt.event_date?' | '+evt.event_date:''})</span>`;
      renderBatchPage();
    }
  }else{const e=await res.json();toast(e.error||'操作失败',1);}
}

async function toggleArchive(){
  const res=await fetch(API+'/events/'+selEvtId+'/archive',{method:'POST'});
  if(res.ok){
    const data=await res.json();
    if(data.archived){
      toast('已归档（仍在当前页）');
      await loadEvents();
    }else{
      toast('已取消归档，事件已移至工作台');
      // 从当前视图移除后重新加载
      selEvtId=null;$('evtDetail').style.display='none';
      await loadEvents();
    }
  }else{const e=await res.json();toast(e.error||'操作失败',1);}
}

async function delRec(rid){
  showConfirm('确定删除此记录？',async()=>{
    const res=await fetch(API+'/records/'+rid,{method:'DELETE'});
    if(res.ok){toast('已删除');loadEventDetail();}
    else{const e=await res.json();toast(e.error||'删除失败',1);}
  });
}

function showEvtModal(evt){
  let title='编辑事件';
  const selType=evt?evt.event_type:'事件';
  showModal(`<h3>${title}</h3>
    <div class="fgroup"><label>事件名称</label><input type="text" id="mEName" value="${evt?escH(evt.name):''}"></div>
    <div class="fgroup"><label>类型</label><select id="mEType">
      <option value="事件" ${selType==='事件'?'selected':''}>事件</option>
      <option value="喜事" ${selType==='喜事'?'selected':''}>喜事</option>
      <option value="丧事" ${selType==='丧事'?'selected':''}>白事</option>
    </select></div>
    <div class="fgroup"><label>日期</label><input type="date" id="mEDate" value="${evt?evt.event_date||'':''}"></div>
    <div class="fgroup"><label>每页条数</label><input type="number" id="mEPageSize" value="${evt?evt.page_size||12:12}" min="4" max="50" step="1"></div>
    <div class="btn-row">
      <button class="btn" onclick="hideModal()">取消</button>
      <button class="btn primary" onclick="saveEvt(${evt.id})">保存</button>
    </div>`);
}

async function saveEvt(eid){
  const name=$('mEName').value.trim(),type=$('mEType').value,date=$('mEDate').value,ps=parseInt($('mEPageSize').value)||12;
  if(!name){toast('事件名称不能为空',1);return;}
  const body={name,event_type:type,event_date:date,page_size:ps};
  let res;
  try{
    res=await fetch(API+'/events/'+eid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }catch(netErr){
    toast('网络请求失败，请检查网络连接',1);return;
  }
  if(res.ok){toast('已更新');hideModal();loadEvents();}
  else{
    let errMsg='保存失败';
    try{
      const ct=res.headers.get('content-type')||'';
      if(ct.includes('json')){
        const e=await res.json();
        errMsg=e.error||e.msg||errMsg;
      }else{
        const txt=await res.text();
        errMsg=`服务器错误(${res.status})`;
        if(txt&&txt.length<200)errMsg+=': '+txt.substring(0,100);
      }
    }catch(x){errMsg=`请求失败(状态码 ${res.status})`;}
    toast(errMsg,1);
  }
}

function editEvt(){
  const evt=events.find(e=>e.id===selEvtId);
  if(evt)showEvtModal(evt);
}

async function deleteEvt(){
  showConfirm('确定删除此事件及其所有记录？此操作不可恢复。',async()=>{
    const res=await fetch(API+'/events/'+selEvtId,{method:'DELETE'});
    if(res.ok){toast('已删除');selEvtId=null;$('evtDetail').style.display='none';loadEvents();}
    else{const e=await res.json();toast(e.error||'删除失败',1);}
  });
}

// ==================== 日常随礼归档 ====================
let dailyRecords=[],dailyEventId=null,selDailyYear=null;

async function loadDailyArchive(){
  try{
    const evts=await fetch(API+'/events').then(r=>r.json());
    const dailyEvt=evts.find(e=>e.event_type==='日常'||e.name==='流水');
    if(!dailyEvt){$('dailyYearGrid').innerHTML='<div class="empty-hint">暂无日常随礼数据</div>';return;}
    dailyEventId=dailyEvt.id;
    dailyRecords=await fetch(API+'/records?event_id='+dailyEventId).then(r=>r.json());
    dailyRecords=dailyRecords.filter(r=>!r.direction||r.direction==='送');
    renderDailyYears();
  }catch(e){$('dailyYearGrid').innerHTML='<div class="empty-hint">加载失败</div>';}
}

function renderDailyYears(){
  selDailyYear=null;
  $('dailyYearTitle').textContent='';
  $('dailyArchiveNav').innerHTML='';
  $('dailyArchiveContent').innerHTML='<div class="evt-grid" id="dailyYearGrid"></div>';
  const byYear={};
  dailyRecords.forEach(r=>{const y=r.date?r.date.slice(0,4):'未知';if(!byYear[y])byYear[y]=[];byYear[y].push(r);});
  const years=Object.keys(byYear).filter(y=>y!=='未知').sort((a,b)=>b-a);
  if(Object.keys(byYear).includes('未知'))years.push('未知');
  if(years.length===0){$('dailyYearGrid').innerHTML='<div class="empty-hint">暂无历史记录</div>';return;}
  $('dailyYearGrid').innerHTML=years.map(y=>{
    const recs=byYear[y],total=recs.reduce((s,r)=>s+(r.amount||0),0);
    return `<div class="evt-item" onclick="selectDailyYear('${y}')">
      <div class="ename">${y}年</div>
      <div class="emeta"><span>${recs.length}条</span><span>${new Set(recs.map(r=>r.name)).size}人</span></div>
      <div class="etotal">${fmtA(total)} 元</div>
    </div>`;
  }).join('');
}

async function selectDailyYear(y){
  selDailyYear=y;
  $('dailyYearTitle').textContent=' · '+y+'年';
  $('dailyArchiveNav').innerHTML='<button class="btn sm" onclick="renderDailyYears()">返回年份列表</button>';
  renderDailyYearDetail();
}

function renderDailyYearDetail(){
  const recs=selDailyYear==='未知'?dailyRecords.filter(r=>!r.date||!r.date.slice(0,4)):dailyRecords.filter(r=>r.date&&r.date.startsWith(selDailyYear));
  const sorted=recs.sort((a,b)=>new Date(b.date||'1900')-new Date(a.date||'1900')||b.id-a.id);
  const total=sorted.reduce((s,r)=>s+(r.amount||0),0);
  let html=`<div class="stat-row">
    <div class="stat-card"><div class="slabel">${selDailyYear}年送出</div><div class="svalue">${fmtA(total)} 元</div></div>
    <div class="stat-card sub"><div class="slabel">记录数</div><div class="svalue">${sorted.length} 条</div></div>
    <div class="stat-card sub"><div class="slabel">涉及人数</div><div class="svalue">${new Set(sorted.map(r=>r.name)).size} 人</div></div>
  </div>`;
  if(sorted.length===0){html+='<div style="text-align:center;padding:20px;color:#999">该年份暂无记录</div>';}
  else{
    html+=`<div class="t-wrap"><table><thead><tr><th style="width:100px">日期</th><th>姓名</th><th>金额</th><th>备注</th></tr></thead><tbody>`;
    sorted.forEach(r=>{
      html+=`<tr><td>${fmtD(r.date)}</td><td>${escH(r.name)}</td><td class="amt num">${fmtA(r.amount)}</td><td style="color:#999">${escH(r.note||'')}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  $('dailyArchiveContent').innerHTML=`
    <div id="dailyYearStats">${html}</div>
  `;
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')hideModal();
  if(e.ctrlKey&&e.key==='Enter')savePage(true);
});

// ==================== 初始化 ====================
loadEvents();
loadDailyArchive();
</script>

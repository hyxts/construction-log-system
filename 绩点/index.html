<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:#f5f7fa;color:#1f2937;font-size:15px;line-height:1.5;overscroll-behavior:none;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%}
header{background:#fff;text-align:center;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));font-size:17px;font-weight:600;position:sticky;top:0;z-index:100;border-bottom:1px solid #eef0f4;display:flex;align-items:center;justify-content:center;gap:8px}
header a{transition:transform 0.2s,opacity 0.2s}

.main{padding:12px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
h3{font-size:16px;margin-bottom:10px;font-weight:600}
input,select{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;width:100%;min-height:44px;background:#fff}
input:focus,select:focus{outline:none;border-color:#2f7d6b;box-shadow:0 0 0 3px rgba(47,125,107,.15)}
button{border:none;border-radius:10px;padding:10px 12px;cursor:pointer;background:#2f7d6b;color:#fff;font-size:14px;font-weight:600;min-height:40px;width:100%;margin-bottom:6px;touch-action:manipulation}
button:active{opacity:.9;transform:scale(.98)}
.btn-red{background:#dc2626!important}.btn-gray{background:#64748b!important}
.btn-sm{padding:6px 10px;min-height:32px;font-size:13px;width:auto;margin:0 3px}
.btn-xs{padding:2px 6px;min-height:22px;font-size:11px;width:auto;margin:0 2px;border-radius:6px}
.gpa-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.gpa-card{background:linear-gradient(135deg,#2f7d6b,#3d9e85);color:#fff;border-radius:12px;padding:16px;text-align:center}
.gpa-card .val{font-size:36px;font-weight:800;line-height:1.1}
.gpa-card .lbl{font-size:12px;opacity:.85;margin-top:4px}
.gpa-card.alt{background:linear-gradient(135deg,#1e40af,#3b82f6)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;text-align:center;margin-bottom:10px}
.stats .stat-item{border-radius:10px;padding:10px 4px;color:#fff}
.stats .stat-item .lbl{font-size:11px;opacity:.85;margin-bottom:4px}
.stats .stat-item .v{font-size:18px;font-weight:700;line-height:1.2}
.si-credit{background:linear-gradient(135deg,#2f7d6b,#3d9e85)}
.si-course{background:linear-gradient(135deg,#1e40af,#3b82f6)}
.si-semester{background:linear-gradient(135deg,#7c3aed,#8b5cf6)}

.item{display:flex;align-items:center;padding:8px 10px;background:#fff;border-radius:10px;margin-bottom:4px;border:1px solid #e5e7eb;gap:8px;min-height:40px;touch-action:manipulation}
.item-content{flex:1;min-width:0;overflow:hidden}.item-title{font-weight:600;font-size:15px;color:#111827}.item-sub{font-size:12px;color:#64748b}
.item-right{flex-shrink:0;text-align:right;font-weight:700;font-size:15px}

.gpa-table th{font-size:11px;color:#94a3b8;font-weight:500;padding:4px 8px 8px;text-align:center;border-bottom:1px solid #e2e8f0}

.gpa-table tr:last-child td{border-bottom:none}
.gpa-table tr:hover td{background:#f8fdf9}
.gpa-table .td-gpa{font-weight:800;font-size:16px;width:42px;text-align:center}
.gpa-table .td-range{font-size:11px;color:#94a3b8;width:44px;text-align:center}
.gpa-table .td-bar{width:auto;padding-left:0;padding-right:6px}
.gpa-table .td-count{width:44px;text-align:right;font-weight:600;font-size:14px;color:#1f2937}
.gpa-table .td-pct{width:44px;text-align:right;font-size:11px;color:#9ca3af}
.gpa-bar-wrap{width:100%;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden}
.gpa-bar-fill{height:100%;border-radius:5px;transition:width .5s ease;min-width:0}
.gpa-row-zero .td-gpa,.gpa-row-zero .td-count,.gpa-row-zero .td-pct{color:#cbd5e1}
/* PC顶部导航 */
.pc-nav{display:flex;gap:4px;padding:6px 12px;border-bottom:1px solid #e5e7eb;background:#fff;overflow-x:auto}

  .item{flex-wrap:wrap}

  .btn-sm{padding:6px 8px;font-size:12px}

@media (min-width:769px){
  .tab-bar{display:none}
  .main{max-width:1100px;margin:0 auto;padding:16px 24px}
  body{background:#eef1f5}
  .tab-content{min-height:auto}
}

<script>
const API='/api/gpa';
let semesters=[],courses=[],gpaChart=null;
const DEFAULT_SEMESTERS=[
  {id:'sem-1',name:'大一上'},{id:'sem-2',name:'大一下'},
  {id:'sem-3',name:'大二上'},{id:'sem-4',name:'大二下'},
  {id:'sem-5',name:'大三上'},{id:'sem-6',name:'大三下'},
  {id:'sem-7',name:'大四上'},{id:'sem-8',name:'大四下'}
];

function scoreToGpa(s){s=Number(s);if(isNaN(s)||s<0)return 0;if(s>=90)return 4;if(s>=85)return 3.7;if(s>=82)return 3.3;if(s>=78)return 3;if(s>=75)return 2.7;if(s>=72)return 2.3;if(s>=68)return 2;if(s>=64)return 1.5;if(s>=60)return 1;return 0}
function gradeClass(s){s=Number(s);if(s>=90)return'grade-a';if(s>=75)return'grade-b';if(s>=60)return'grade-c';return'grade-d'}
function catBadge(c){const m={major_required:['专业必修','b-required'],public_required:['公共必修','b-required'],general_required:['通识必修','b-major'],elective:['选修','b-elective']};const[n,cls]=m[c]||['其他',''];return`<span class="badge ${cls}">${n}</span>`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function loadData(){
  try{const r=await fetch(API+'/data');const j=await r.json();if(j.success&&j.data){semesters=j.data.semesters||[];courses=j.data.courses||[]}}catch(e){}
  if(!semesters.length && !courses.length)semesters=[...DEFAULT_SEMESTERS];
  refreshAll();
}
async function saveData(){await fetch(API+'/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({semesters,courses})})}
function refreshAll(){renderOverview();renderSemesters();renderChart();renderCourseBarChart();if(document.getElementById('semManager').style.display!=='none')renderSemManager()}

function calcSemGpa(semId){const sc=courses.filter(c=>c.semesterId===semId&&c.score);if(!sc.length)return 0;let ts=0,tc=0;sc.forEach(c=>{const s=Number(c.score);const cr=Number(c.credit)||0;ts+=scoreToGpa(s)*cr;tc+=cr});return tc?ts/tc:0}
function cumulativeGpa(){let ts=0,tc=0;courses.forEach(c=>{if(!c.score)return;const s=Number(c.score);const cr=Number(c.credit)||0;ts+=scoreToGpa(s)*cr;tc+=cr});return tc?ts/tc:0}

function getLatestSemWithGpa(){
  for(let i=semesters.length-1;i>=0;i--){if(calcSemGpa(semesters[i].id)>0)return semesters[i]}
  return semesters.length?semesters[semesters.length-1]:null;
}

function renderOverview(){
  const cumGpa=cumulativeGpa();
  const latest=getLatestSemWithGpa();
  const latestGpa=latest?calcSemGpa(latest.id):0;
  document.getElementById('latestGpa').textContent=latestGpa?latestGpa.toFixed(2):'-';
  document.getElementById('cumulativeGpa').textContent=cumGpa?cumGpa.toFixed(2):'-';
  document.getElementById('totalCredits').textContent=courses.reduce((s,c)=>s+(Number(c.credit)||0),0);
  document.getElementById('totalCourses').textContent=courses.length;
  document.getElementById('totalSemesters').textContent=semesters.length;

  // 最近学期平均分
  const sc=courses.filter(c=>c.score);
  const latestScores=latest?sc.filter(c=>c.semesterId===latest.id).map(c=>Number(c.score)):[];
  if(latestScores.length){
    const avg=(latestScores.reduce((a,b)=>a+b,0)/latestScores.length).toFixed(1);
    document.getElementById('latestAvgScore').textContent=avg;
  }else{
    document.getElementById('latestAvgScore').textContent='-';
  }

  // 全部课程平均分
  if(sc.length){
    const allAvg=(sc.reduce((a,c)=>a+Number(c.score),0)/sc.length).toFixed(1);
    document.getElementById('allAvgScore').textContent=allAvg;
  }else{
    document.getElementById('allAvgScore').textContent='-';
  }
}

function renderChart(){
  const active=semesters.filter(s=>courses.some(c=>c.semesterId===s.id));
  const labels=active.map(s=>s.name);
  const data=active.map(s=>{const g=calcSemGpa(s.id);return g?Number(g.toFixed(2)):null});
  if(gpaChart)gpaChart.destroy();
  const ctx=document.getElementById('gpaChart');
  if(!ctx||!labels.length){ctx.parentElement.innerHTML='<div class="empty">暂无数据</div>';return}
  gpaChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'GPA',data,borderColor:'#2f7d6b',backgroundColor:'rgba(47,125,107,.12)',tension:.35,fill:true,pointRadius:5,pointBackgroundColor:'#fff',pointBorderColor:'#2f7d6b',pointBorderWidth:2,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(15,23,42,.85)',titleFont:{size:13},bodyFont:{size:14,weight:'bold'},padding:10,cornerRadius:8,callbacks:{label:function(ctx){return'GPA: '+ctx.parsed.y.toFixed(2)}}}},scales:{y:{min:0,max:4,ticks:{stepSize:1,font:{size:11},color:'#94a3b8'},grid:{color:'rgba(0,0,0,.06)'}},x:{ticks:{font:{size:12,weight:'500'},color:'#475569'},grid:{display:false}}}},plugins:[{id:'gpaLabels',afterDatasetsDraw:function(chart){const meta=chart.getDatasetMeta(0);const ctx=chart.ctx;ctx.save();ctx.font='bold 11px -apple-system,BlinkMacSystemFont,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';meta.data.forEach(function(pt,i){const v=chart.data.datasets[0].data[i];if(v!=null){ctx.fillStyle='#2f7d6b';ctx.fillText(v.toFixed(2),pt.x,pt.y-7)}});ctx.restore()}}]});
}

function renderSemesters(){
  const el=document.getElementById('semesterBlocks');
  if(!semesters.length){el.innerHTML='<div class="empty">暂无学期，点击上方按钮添加</div>';return}
  el.innerHTML=semesters.map(s=>{
    const sc=courses.filter(c=>c.semesterId===s.id);
    const gpa=calcSemGpa(s.id);
    const isCollapsed=collapsedSems.has(s.id);
    return`<div class="sem-block">
      <div class="sem-hdr${isCollapsed?' collapsed':''}" onclick="toggleSemCollapse('${s.id}')">
        <span class="collapse-arrow">&#9660;</span>
        <div style="flex:1;min-width:0"><span class="name">${esc(s.name)}</span> <span class="info">${sc.length}门</span></div>
        <div style="display:flex;align-items:center;gap:8px" onclick="event.stopPropagation()">
          <span class="gpa">${gpa?gpa.toFixed(2):'-'}</span>
          <span class="actions"><button class="btn-xs btn-red" onclick="event.stopPropagation();confirmDelSemester('${s.id}')">删</button></span>
        </div>
      </div>
      <div class="sem-courses${isCollapsed?' collapsed':''}">
      ${sc.map((c,idx)=>`<div class="item course-item" draggable="true" data-id="${c.id}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event)">
        <span class="seq">${idx+1}</span>
        <span class="drag-handle">⋮⋮</span>
        <div class="item-content" onclick="editCourse('${c.id}')">
          <div class="item-title">${esc(c.name)} ${catBadge(c.category)}</div>
          <div class="item-sub">${c.credit||0}学分${c.score?' · 成绩 '+c.score:''}</div>
        </div>
        <div class="item-right ${c.score?gradeClass(c.score):''}">${c.score?scoreToGpa(Number(c.score)).toFixed(1):'-'}</div>
        <div class="item-actions"><button class="btn-xs btn-red" onclick="event.stopPropagation();confirmDelCourse('${c.id}')">删</button></div>
      </div>`).join('')||'<div style="padding:8px 12px;color:#9ca3af;font-size:13px">暂无课程，点击「添加课程」</div>'}
      </div>
    </div>`;
  }).join('');
}

let dragId=null;
let collapsedSems=new Set(JSON.parse(localStorage.getItem('gpa_collapsed')||'[]'));
function dragStart(e){dragId=e.target.dataset.id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function dragLeave(e){e.currentTarget.classList.remove('drag-over')}
function dragDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const targetId=e.currentTarget.dataset.id;
  if(!dragId||dragId===targetId)return;
  const fi=courses.findIndex(c=>c.id===dragId);
  const ti=courses.findIndex(c=>c.id===targetId);
  if(fi<0||ti<0)return;
  const [item]=courses.splice(fi,1);
  courses.splice(ti,0,item);
  saveData();renderSemesters();dragId=null;
}

function showCourseModal(editId,preselectSem){
  document.getElementById('courseEditId').value=editId||'';
  document.getElementById('courseModalTitle').textContent=editId?'编辑课程':'添加课程';
  const sel=document.getElementById('courseSemester');
  sel.innerHTML=semesters.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  if(preselectSem)sel.value=preselectSem;
  if(editId){const c=courses.find(x=>x.id===editId);if(c){sel.value=c.semesterId;document.getElementById('courseName').value=c.name;document.getElementById('courseCredit').value=c.credit||'';document.getElementById('courseScore').value=c.score||'';document.getElementById('courseCategory').value=c.category||'major_required'}}
  else{
    document.getElementById('courseName').value='';document.getElementById('courseCredit').value='';document.getElementById('courseScore').value='';
    document.getElementById('courseCategory').value='major_required';
    const lastSem=localStorage.getItem('gpa_lastSemester');
    if(lastSem && semesters.some(s=>s.id===lastSem)) sel.value=lastSem;
  }
  document.getElementById('courseModal').classList.add('show');
}
function closeCourseModal(){document.getElementById('courseModal').classList.remove('show')}
function saveCourse(){
  const id=document.getElementById('courseEditId').value;
  const name=document.getElementById('courseName').value.trim();
  const credit=Number(document.getElementById('courseCredit').value)||0;
  const score=Number(document.getElementById('courseScore').value)||0;
  const category=document.getElementById('courseCategory').value;
  const semesterId=document.getElementById('courseSemester').value;
  if(!name){alert('请输入课程名称');return}
  if(id){const c=courses.find(x=>x.id===id);if(c){c.name=name;c.credit=credit;c.score=score||null;c.category=category;c.semesterId=semesterId}}
  else{courses.push({id:'c-'+Date.now(),name,credit,score:score||null,category,semesterId})}
  localStorage.setItem('gpa_lastSemester',semesterId);
  saveData();closeCourseModal();refreshAll();
}
function editCourse(id){showCourseModal(id)}
function confirmDelCourse(id){const c=courses.find(x=>x.id===id);if(!c)return;document.getElementById('confirmMsg').textContent=`确定删除"${c.name}"？`;document.getElementById('confirmBtn').onclick=()=>{courses=courses.filter(x=>x.id!==id);saveData();closeConfirm();refreshAll()};document.getElementById('confirmModal').classList.add('show')}

function showSemesterModal(editId){
  document.getElementById('semEditId').value=editId||'';
  document.getElementById('semesterModalTitle').textContent=editId?'编辑学期':'添加学期';
  if(editId){const s=semesters.find(x=>x.id===editId);if(s){document.getElementById('semName').value=s.name;document.getElementById('semStart').value=s.startDate||'';document.getElementById('semEnd').value=s.endDate||''}}
  else{document.getElementById('semName').value='';document.getElementById('semStart').value='';document.getElementById('semEnd').value=''}
  document.getElementById('semesterModal').classList.add('show');
}
function closeSemesterModal(){document.getElementById('semesterModal').classList.remove('show')}
function saveSemester(){
  const id=document.getElementById('semEditId').value;
  const name=document.getElementById('semName').value.trim();
  const startDate=document.getElementById('semStart').value;
  const endDate=document.getElementById('semEnd').value;
  if(!name){alert('请输入学期名称');return}
  if(id){const s=semesters.find(x=>x.id===id);if(s){s.name=name;s.startDate=startDate;s.endDate=endDate}}
  else{semesters.push({id:'sem-'+Date.now(),name,startDate,endDate})}
  saveData();closeSemesterModal();refreshAll();
}
function editSemester(id){showSemesterModal(id)}
function confirmDelSemester(id){const s=semesters.find(x=>x.id===id);if(!s)return;const cnt=courses.filter(c=>c.semesterId===id).length;document.getElementById('confirmMsg').textContent=cnt>0?`"${s.name}"下有${cnt}门课程，删除学期将同时删除这些课程`:`确定删除"${s.name}"？`;document.getElementById('confirmBtn').onclick=()=>{if(cnt>0)courses=courses.filter(c=>c.semesterId!==id);semesters=semesters.filter(x=>x.id!==id);saveData();closeConfirm();refreshAll()};document.getElementById('confirmModal').classList.add('show')}

function toggleSemCollapse(semId){
  if(collapsedSems.has(semId)) collapsedSems.delete(semId);
  else collapsedSems.add(semId);
  localStorage.setItem('gpa_collapsed',JSON.stringify([...collapsedSems]));
  renderSemesters();
}

function closeConfirm(){document.getElementById('confirmModal').classList.remove('show')}

function toggleSemManager(){
  const el=document.getElementById('semManager');
  const show=el.style.display==='none';
  el.style.display=show?'block':'none';
  if(show)renderSemManager();
}

function renderSemManager(){
  document.getElementById('semCount').textContent='共 '+semesters.length+' 个学期';
  const el=document.getElementById('semManagerList');
  el.innerHTML=semesters.map(s=>{
    const cnt=courses.filter(c=>c.semesterId===s.id).length;
    const gpa=calcSemGpa(s.id);
    return`<div class="item">
      <div class="item-content" onclick="editSemester('${s.id}')">
        <div class="item-title">${esc(s.name)}</div>
        <div class="item-sub">${cnt}门课程${gpa?' · GPA '+gpa.toFixed(2):''}</div>
      </div>
      <div class="item-actions">
        <button class="btn-xs" onclick="event.stopPropagation();editSemester('${s.id}')">编辑</button>
        <button class="btn-xs btn-red" onclick="event.stopPropagation();confirmDelSemester('${s.id}')">删除</button>
      </div>
    </div>`;
  }).join('')||'<div class="empty">暂无学期</div>';
}

function renderCourseBarChart(){
  const sc=courses.filter(c=>c.score);
  const el=document.getElementById('gpaTable');
  const summary=document.getElementById('gpaSummary');
  if(!el)return;
  if(!sc.length){document.getElementById('courseBarTitle').textContent='绩点分布';el.innerHTML='<div class="empty">暂无成绩数据</div>';if(summary)summary.textContent='';return}

  const points=[
    {gpa:4.0,range:'90-100',color:'#0d6e3e'},
    {gpa:3.7,range:'85-89',color:'#16a34a'},
    {gpa:3.3,range:'82-84',color:'#22c55e'},
    {gpa:3.0,range:'78-81',color:'#14b8a6'},
    {gpa:2.7,range:'75-77',color:'#2563eb'},
    {gpa:2.3,range:'72-74',color:'#7c3aed'},
    {gpa:2.0,range:'68-71',color:'#d97706'},
    {gpa:1.5,range:'64-67',color:'#ea580c'},
    {gpa:1.0,range:'60-63',color:'#dc2626'},
    {gpa:0,  range:'0-59', color:'#991b1b'}
  ];

  const gpasAll=sc.map(c=>scoreToGpa(Number(c.score)));
  const counts=points.map(p=>gpasAll.filter(g=>g===p.gpa).length);
  const maxCount=Math.max(...counts,1);
  const totalN=counts.reduce((a,b)=>a+b,0);

  document.getElementById('courseBarTitle').textContent='绩点分布 · '+sc.length+'门';

  // 汇总信息
  const avgGpa=(gpasAll.reduce((a,b)=>a+b,0)/gpasAll.length).toFixed(2);
  const above30=gpasAll.filter(g=>g>=3.0).length;
  if(summary)summary.textContent='均绩 '+avgGpa+'  ·  3.0以上 '+above30+'门 ('+((above30/sc.length)*100).toFixed(0)+'%)';

  el.innerHTML=`<table class="gpa-table">
    <thead><tr><th>绩点</th><th>分数</th><th style="text-align:left">分布</th><th>数量</th><th>占比</th></tr></thead>
    <tbody>${points.map((p,i)=>{
    const n=counts[i];
    const pct=((n/sc.length)*100).toFixed(1);
    const barW=Math.max((n/maxCount)*100, n>0?3:0);
    const rowCls=n===0?'gpa-row-zero':'';
    return`<tr class="${rowCls}">
      <td class="td-gpa" style="color:${p.color}">${p.gpa.toFixed(1)}</td>
      <td class="td-range">${p.range}</td>
      <td class="td-bar"><div class="gpa-bar-wrap"><div class="gpa-bar-fill" style="width:${barW}%;background:${p.color}"></div></div></td>
      <td class="td-count">${n>0?n+'门':'-'}</td>
      <td class="td-pct">${n>0?pct+'%':''}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('show'));
  document.getElementById('tab-'+name).classList.add('show');
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',(name==='overview'&&i===0)||(name==='courses'&&i===1))});
  document.querySelectorAll('.pc-nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===name));
  if(name==='overview'){renderChart();renderCourseBarChart();}
}

document.getElementById('pcNav').addEventListener('click',e=>{
  const btn=e.target.closest('.pc-nav-btn');
  if(btn) switchTab(btn.dataset.page);
});

loadData();
</script>
</body>
</html>

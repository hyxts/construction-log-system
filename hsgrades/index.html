<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
// ==================== 数据层 ====================
let exams = [];
const SUBJECTS = [
  { key: 'chinese', label: '语文', color: '#f59e0b', assigned: false },
  { key: 'math', label: '数学', color: '#3b82f6', assigned: false },
  { key: 'english', label: '英语', color: '#8b5cf6', assigned: false },
  { key: 'history', label: '历史', color: '#ef4444', assigned: false },
  { key: 'politics', label: '政治', color: '#10b981', assigned: true },
  { key: 'geography', label: '地理', color: '#6366f1', assigned: true }
];

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtNum(v, decimals) {
  if (v === null || v === undefined || v === '') return '-';
  var n = Number(v);
  if (isNaN(n)) return '-';
  if (decimals !== undefined && decimals !== null) return n.toFixed(decimals);
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

// ==================== 计算 ====================
function getSubjectScore(exam, key) {
  if (!exam || !exam.scores) return 0;
  return Number(exam.scores[key]) || 0;
}

function getSubjectAssigned(exam, key) {
  if (!exam || !exam.assignedScores) return 0;
  return Number(exam.assignedScores[key]) || 0;
}

function getEffectiveScore(exam, key) {
  var subj = SUBJECTS.find(function(s) { return s.key === key; });
  var raw = getSubjectScore(exam, key);
  if (subj && subj.assigned) {
    var av = getSubjectAssigned(exam, key);
    return av > 0 ? av : raw;
  }
  return raw;
}

function calcMainScore(exam) {
  var c = getSubjectScore(exam, 'chinese');
  var m = getSubjectScore(exam, 'math');
  var e = getSubjectScore(exam, 'english');
  return (c + m + e) || 0;
}

function calcThreeScore(exam) {
  var h = getSubjectScore(exam, 'history');
  var p = getEffectiveScore(exam, 'politics');
  var g = getEffectiveScore(exam, 'geography');
  return (h + p + g) || 0;
}

function calcTotal(exam) {
  return calcMainScore(exam) + calcThreeScore(exam);
}

// 获取单科排名（兼容旧数据格式）
function getSubjectRank(exam, key, level) {
  if (!exam || !exam.ranks) return null;
  var r = exam.ranks[key];
  if (r === null || r === undefined) return null;
  if (typeof r === 'object') return r[level] || null;
  if (typeof r === 'number') return level === 'district' ? r : null;
  return null;
}

function getScoreColor(val) {
  val = Number(val) || 0;
  if (val >= 90) return 'score-good';
  if (val >= 70) return 'score-mid';
  if (val > 0 && val < 60) return 'score-low';
  return '';
}

// 自动计算总分
function autoCalc() {
  var scores = {};
  var assignedScores = {};
  SUBJECTS.forEach(function(s) {
    var sv = document.getElementById('s_' + s.key).value;
    scores[s.key] = sv !== '' ? Number(sv) : null;
    if (s.assigned) {
      var av = document.getElementById('a_' + s.key).value;
      assignedScores[s.key] = av !== '' ? Number(av) : null;
    }
  });
  var tmp = { scores: scores, assignedScores: assignedScores };

  var mainVal = calcMainScore(tmp);
  var threeVal = calcThreeScore(tmp);
  var totalVal = calcTotal(tmp);

  document.getElementById('totalScore').value = totalVal > 0 ? totalVal.toFixed(1) : '';
  document.getElementById('mainScore').value = mainVal > 0 ? mainVal.toFixed(1) : '';
  document.getElementById('threeScore').value = threeVal > 0 ? threeVal.toFixed(1) : '';
}

// ==================== 持久化 ====================
async function loadData() {
  var serverLoaded = false;
  try {
    var resp = await fetch('/api/hsgrades/data');
    var json = await resp.json();
    if (json.success && json.data) {
      exams = json.data.exams || [];
      localStorage.setItem('hsgradesData', JSON.stringify(exams));
      serverLoaded = true;
    }
  } catch(e) {}

  if (!serverLoaded) {
    var d = localStorage.getItem('hsgradesData');
    if (d) {
      try { exams = JSON.parse(d); } catch(e) { exams = []; }
    }
  }

  if (!exams || exams.length === 0) {
    exams = DEFAULT_EXAMS;
    saveData();
  }

  refreshAll();
}

function saveData() {
  localStorage.setItem('hsgradesData', JSON.stringify(exams));
  try {
    fetch('/api/hsgrades/data', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ exams })
    }).catch(function() {});
  } catch(e) {}
}

async function pullFromServer() {
  try {
    var resp = await fetch('/api/hsgrades/data');
    var json = await resp.json();
    if (json.success && json.data) {
      exams = json.data.exams || [];
      localStorage.setItem('hsgradesData', JSON.stringify(exams));
      refreshAll();
    }
  } catch(e) {}
}

// ==================== Tab 切换 ====================
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.tab-item').forEach(function(el) { el.classList.remove('active'); });
  var tabEl = document.getElementById('tab-' + tabId);
  if (tabEl) tabEl.classList.add('active');
  var navItem = document.querySelector('.tab-item[data-tab="' + tabId + '"]');
  if (navItem) navItem.classList.add('active');

  if (tabId === 'overview') renderOverview();
  if (tabId === 'exams') renderExams();
}

// ==================== 高考倒计时 ====================
function updateGaokaoCountdown() {
  var now = new Date();
  var y = now.getFullYear();
  var gk = new Date(y, 5, 7);
  if (now > gk) {
    gk = new Date(y + 1, 5, 7);
  }
  var diff = Math.ceil((gk - now) / (1000 * 60 * 60 * 24));
  var el = document.getElementById('gaokaoCountdown');
  var lbl = document.getElementById('gaokaoLabel');
  if (el) {
    if (diff === 0) {
      el.innerHTML = '离高考<span class="countdown-num" style="font-size:22px">今天</span>';
    } else {
      el.innerHTML = '离高考<span class="countdown-num" style="font-size:22px">' + diff + '</span><span class="countdown-text">天</span>';
    }
    if (lbl) lbl.textContent = '';
  }
}

function renderOverview() {
  var activeExams = exams.filter(function(e) {
    return e.scores && Object.values(e.scores).some(function(v) { return Number(v) > 0; });
  });

  // 高考倒计时
  updateGaokaoCountdown();

  if (activeExams.length > 0) {
    // 平均总分 & 最高总分
    var totals = activeExams.map(function(e) { return calcTotal(e); }).filter(function(t) { return t > 0; });
    if (totals.length > 0) {
      var sum = totals.reduce(function(a, b) { return a + b; }, 0);
      document.getElementById('avgTotal').textContent = (sum / totals.length).toFixed(1);
      document.getElementById('maxTotal').textContent = Math.max.apply(null, totals).toFixed(1);
    } else {
      document.getElementById('avgTotal').textContent = '-';
      document.getElementById('maxTotal').textContent = '-';
    }
    var last = activeExams[activeExams.length - 1];
    var total = calcTotal(last);
    document.getElementById('latestTotal').textContent = total > 0 ? total.toFixed(1) : '-';
  } else {
    document.getElementById('avgTotal').textContent = '-';
    document.getElementById('maxTotal').textContent = '-';
    document.getElementById('latestTotal').textContent = '-';
  }

  // 最近考试详情
  var detailEl = document.getElementById('recentDetail');
  if (activeExams.length === 0) {
    detailEl.innerHTML = '<div class="empty-state">暂无成绩数据，点击"成绩录入"添加</div>';
  } else {
    var lastExam = activeExams[activeExams.length - 1];
    var totalVal = calcTotal(lastExam);
    var mainVal = calcMainScore(lastExam);
    var threeVal = calcThreeScore(lastExam);
    detailEl.innerHTML =
      '<div style="font-size:14px;font-weight:600;color:#1e293b;margin-bottom:8px">' + escapeHtml(lastExam.name) +
      (lastExam.className ? ' · ' + escapeHtml(lastExam.className) : '') + '</div>' +
      '<table style="width:100%;font-size:13px">' +
      '<tr><td style="color:#6b7280;padding:3px 0;width:45%">总成绩</td><td style="font-weight:600;color:#7c3aed">' + (totalVal > 0 ? totalVal.toFixed(1) : '-') + '</td></tr>' +
      '<tr><td style="color:#6b7280;padding:3px 0">主科总分</td><td style="font-weight:600;color:#7c3aed">' + (mainVal > 0 ? mainVal.toFixed(1) : '-') + '</td></tr>' +
      '<tr><td style="color:#6b7280;padding:3px 0">三科总分</td><td style="font-weight:600;color:#be185d">' + (threeVal > 0 ? threeVal.toFixed(1) : '-') + '</td></tr>' +
      '<tr><td style="color:#6b7280;padding:3px 0">区排名</td><td style="font-weight:600;color:#7c3aed">' + (lastExam.distRank ? lastExam.distRank : '-') + '</td></tr>' +
      '<tr><td style="color:#6b7280;padding:3px 0">校排名</td><td style="font-weight:600;color:#0891b2">' + (lastExam.schoolRank ? lastExam.schoolRank : '-') + '</td></tr>' +
      '<tr><td style="color:#6b7280;padding:3px 0">班排名</td><td style="font-weight:600;color:#d946ef">' + (lastExam.classRank ? lastExam.classRank : '-') + '</td></tr>' +
      SUBJECTS.map(function(s) {
        var rawVal = lastExam.scores[s.key];
        var v = (rawVal !== null && rawVal !== undefined && rawVal !== '') ? Number(rawVal) : null;
        var a = s.assigned ? getSubjectAssigned(lastExam, s.key) : 0;
        var rd = getSubjectRank(lastExam, s.key, 'district');
        var rs = getSubjectRank(lastExam, s.key, 'school');
        var rc = getSubjectRank(lastExam, s.key, 'class');
        var desc;
        if (s.assigned) {
          desc = (v !== null && !isNaN(v) ? '<span class="' + getScoreColor(v) + '">' + v.toFixed(1) + '</span>' : '-');
          desc += ' <span style="font-size:10px;color:#94a3b8">/</span> ';
          desc += (a > 0 ? '<span style="font-weight:700;color:' + s.color + '">' + a.toFixed(0) + '</span>' : '<span style="color:#94a3b8">-</span>');
          desc += '<span style="font-size:10px;color:#94a3b8">赋</span>';
        } else {
          desc = (v !== null && !isNaN(v) ? '<span class="' + getScoreColor(v) + '">' + v.toFixed(1) + '</span>' : '-');
        }
        var rankStr = '';
        if (rd) rankStr += '区' + rd + ' ';
        if (rs) rankStr += '校' + rs + ' ';
        if (rc) rankStr += '班' + rc;
        return '<tr><td style="color:#6b7280;padding:3px 0">' +
          '<span class="subj-badge" style="background:' + s.color + '22;color:' + s.color + '">' + s.label + '</span></td>' +
          '<td>' + desc +
          (rankStr ? ' <span class="rank-cell">(' + rankStr.trim() + ')</span>' : '') + '</td></tr>';
      }).join('') +
      '</table>';
  }

  renderTotalChart();
  renderSubjectRankChart();
}

function renderSubjectRankBtns() {
  var container = document.getElementById('subjRankBtns');
  if (!container) return;
  container.innerHTML = Object.keys(RANK_GROUPS).map(function(gk) {
    var g = RANK_GROUPS[gk];
    var active = _currentRankGroup === gk;
    return '<button class="btn-xs" style="' +
      (active ? 'background:#7c3aed;color:#fff;font-weight:700' : 'background:#f1f5f9;color:#64748b') +
      ';border:2px solid ' + (active ? '#7c3aed' : '#e2e8f0') + ';border-radius:8px;padding:8px 18px;font-size:13px;margin:0;flex-shrink:0' +

  }).join('');

function switchRankGroup(key) {
  _currentRankGroup = key;
  renderSubjectRankBtns();
  renderSubjectRankChart();
}

function renderSubjectRankChart() {
  var canvas = document.getElementById('subjectRankChart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  if (_subjectRankChart) { _subjectRankChart.destroy(); _subjectRankChart = null; }

  var items = exams.filter(function(e) {
    return e.scores && Object.values(e.scores).some(function(v) { return Number(v) > 0; });
  });

  if (items.length === 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#94a3b8';
    ctx.font = '13px sans-serif';
    ctx.fillText('暂无数据', canvas.width / 2, canvas.height / 2);
    renderSubjectRankBtns();
    return;
  }

  var group = RANK_GROUPS[_currentRankGroup];
  var labels = items.map(function(e) { return e.name; });

  // 为该组所有科目收集校排、班排数据
  var datasets = [];
  var allVals = [];
  var hasAnyRank = false;

  group.keys.forEach(function(key) {
    var subj = SUBJECTS.find(function(s) { return s.key === key; });
    if (!subj) return;
    var schData = [];
    var clsData = [];
    items.forEach(function(e) {
      var rs = getSubjectRank(e, key, 'school');
      var rc = getSubjectRank(e, key, 'class');
      var rsv = (rs !== null && rs !== undefined && rs > 0) ? Number(rs) : null;
      var rcv = (rc !== null && rc !== undefined && rc > 0) ? Number(rc) : null;
      schData.push(rsv);
      clsData.push(rcv);
      if (rsv) { allVals.push(rsv); hasAnyRank = true; }
      if (rcv) { allVals.push(rcv); hasAnyRank = true; }
    });

    // 校排名：实线
    datasets.push({
      label: subj.label + '校排',
      data: schData,
      borderColor: subj.color,
      backgroundColor: subj.color + '18',
      fill: false,
      tension: .3,
      pointRadius: 4,
      pointBackgroundColor: subj.color,
      pointBorderColor: '#fff',
      pointBorderWidth: 2,
      borderWidth: 2.5,
      spanGaps: true
    });

    // 班排名：虚线
    datasets.push({
      label: subj.label + '班排',
      data: clsData,
      borderColor: subj.color,
      backgroundColor: 'transparent',
      fill: false,
      tension: .3,
      pointRadius: 3,
      pointBackgroundColor: subj.color,
      pointBorderColor: '#fff',
      pointBorderWidth: 1.5,
      borderWidth: 2,
      borderDash: [5, 3],
      spanGaps: true
    });
  });

  if (!hasAnyRank) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#94a3b8';
    ctx.font = '13px sans-serif';
    ctx.fillText('该组暂无排名数据', canvas.width / 2, canvas.height / 2);
    renderSubjectRankBtns();
    return;
  }

  var yMax = allVals.length > 0 ? Math.ceil(Math.max.apply(null, allVals) * 1.05) : 100;

  _subjectRankChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 10, font: { size: 10 }, boxWidth: 20 } },
        tooltip: {
          mode: 'index',
          callbacks: {
            label: function(ctx) {
              if (ctx.raw === null) return ctx.dataset.label + ': 无数据';
              return ctx.dataset.label + ': 第 ' + ctx.raw + ' 名';
            }
          }
        }
      },
      scales: {
        y: {
          reverse: true,
          min: 1,
          max: yMax,
          grid: { color: '#f1f5f9' },
          ticks: {
            font: { size: 11 },
            stepSize: Math.max(1, Math.floor(yMax / 8)),
            callback: function(v) { return v % 1 === 0 ? v : ''; }
          },
          title: { display: true, text: '排名 (越往上越靠前)', font: { size: 10 }, color: '#94a3b8' }
        },
        x: { grid: { display: false }, ticks: { font: { size: 11 }, maxRotation: 45 } }
      }
    }
  });

  renderSubjectRankBtns();
}

// ==================== 考试列表 ====================
function renderExams() {
  var tbody = document.getElementById('examTableBody');
  if (!tbody) return;

  if (exams.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14" class="empty-state">暂无考试记录，点击上方按钮添加</td></tr>';
    return;
  }

  tbody.innerHTML = exams.map(function(e) {
    var total = calcTotal(e);
    var main = calcMainScore(e);
    var three = calcThreeScore(e);

    function buildScoreStr(sKey) {
      var rawVal = e.scores[sKey];
      var v = (rawVal !== null && rawVal !== undefined && rawVal !== '') ? Number(rawVal) : null;
      var a = getSubjectAssigned(e, sKey);
      var subj = SUBJECTS.find(function(x) { return x.key === sKey; });
      if (subj && subj.assigned) {
        var s = (v !== null && !isNaN(v) ? '<span class="' + getScoreColor(v) + '">' + v.toFixed(0) + '</span>' : '-');
        s += '<br><span style="font-size:10px;color:#94a3b8">赋' + (a > 0 ? '<span style="color:' + subj.color + ';font-weight:700">' + a.toFixed(0) + '</span>' : '-') + '</span>';
        return s;
      }
      return '<span class="cell-score">' + fmtNum(v, 0) + '</span>';
    }

    return '<tr>' +
      '<td class="col-period">' + escapeHtml(e.name) + (e.className ? ' <span style="font-weight:400;font-size:10px;color:#94a3b8">' + escapeHtml(e.className) + '</span>' : '') + '</td>' +
      '<td class="cell-score" style="font-weight:700;color:#7c3aed">' + fmtNum(total, 1) + '</td>' +
      '<td class="rank-cell">' + fmtNum(e.distRank) + '</td>' +
      '<td class="rank-cell">' + fmtNum(e.schoolRank) + '</td>' +
      '<td class="rank-cell">' + fmtNum(e.classRank) + '</td>' +
      '<td class="cell-score" style="color:#f59e0b">' + fmtNum(main, 1) + '</td>' +
      '<td class="cell-score" style="color:#be185d">' + fmtNum(three, 1) + '</td>' +
      '<td class="cell-score ' + getScoreColor(e.scores.chinese) + '">' + fmtNum(e.scores.chinese, 0) + '</td>' +
      '<td class="cell-score ' + getScoreColor(e.scores.math) + '">' + fmtNum(e.scores.math, 0) + '</td>' +
      '<td class="cell-score ' + getScoreColor(e.scores.english) + '">' + fmtNum(e.scores.english, 0) + '</td>' +
      '<td class="cell-score ' + getScoreColor(e.scores.history) + '">' + fmtNum(e.scores.history, 0) + '</td>' +
      '<td>' + buildScoreStr('politics') + '</td>' +
      '<td>' + buildScoreStr('geography') + '</td>' +
      '<td style="white-space:nowrap">' +
      '<button class="btn-xs btn-gray" onclick="editExam(\'' + e.id + '\')" style="margin:0 2px">编辑</button>' +
      '<button class="btn-xs btn-red" onclick="confirmDelExam(\'' + e.id + '\')" style="margin:0">删除</button>' +
      '</td></tr>';
  }).join('');
}

// ==================== 考试 CRUD ====================
function showExamModal(id) {
  document.getElementById('examEditId').value = id || '';
  document.getElementById('examModalTitle').textContent = id ? '编辑考试成绩' : '添加考试成绩';

  if (id) {
    var ex = exams.find(function(x) { return x.id === id; });
    if (ex) {
      document.getElementById('examName').value = ex.name || '';
      document.getElementById('examClass').value = ex.className || '';
      document.getElementById('examDistRank').value = ex.distRank || '';
      document.getElementById('examSchoolRank').value = ex.schoolRank || '';
      document.getElementById('examClassRank').value = ex.classRank || '';

      SUBJECTS.forEach(function(s) {
        var sv = document.getElementById('s_' + s.key);
        if (sv) sv.value = (ex.scores && ex.scores[s.key] !== undefined && ex.scores[s.key] !== null) ? ex.scores[s.key] : '';

        // 三级排名
        var rd = getSubjectRank(ex, s.key, 'district');
        var rs = getSubjectRank(ex, s.key, 'school');
        var rc = getSubjectRank(ex, s.key, 'class');
        var rdEl = document.getElementById('rd_' + s.key);
        var rsEl = document.getElementById('rs_' + s.key);
        var rcEl = document.getElementById('rc_' + s.key);
        if (rdEl) rdEl.value = rd || '';
        if (rsEl) rsEl.value = rs || '';
        if (rcEl) rcEl.value = rc || '';

        if (s.assigned) {
          var av = document.getElementById('a_' + s.key);
          if (av) av.value = (ex.assignedScores && ex.assignedScores[s.key] !== undefined && ex.assignedScores[s.key] !== null) ? ex.assignedScores[s.key] : '';
        }
      });

      // 自动计算显示
      autoCalc();
    }
  } else {
    document.getElementById('examName').value = '';
    document.getElementById('examClass').value = '';
    document.getElementById('examDistRank').value = '';
    document.getElementById('examSchoolRank').value = '';
    document.getElementById('examClassRank').value = '';
    document.getElementById('totalScore').value = '';
    document.getElementById('mainScore').value = '';
    document.getElementById('threeScore').value = '';

    SUBJECTS.forEach(function(s) {
      var sv = document.getElementById('s_' + s.key);
      if (sv) sv.value = '';
      var rdEl = document.getElementById('rd_' + s.key);
      var rsEl = document.getElementById('rs_' + s.key);
      var rcEl = document.getElementById('rc_' + s.key);
      if (rdEl) rdEl.value = '';
      if (rsEl) rsEl.value = '';
      if (rcEl) rcEl.value = '';
      if (s.assigned) {
        var av = document.getElementById('a_' + s.key);
        if (av) av.value = '';
      }
    });
  }

  document.getElementById('examModal').classList.add('show');
}

function closeExamModal() {
  document.getElementById('examModal').classList.remove('show');
}

function saveExam() {
  var name = document.getElementById('examName').value.trim();
  if (!name) { alert('请输入考试名称'); return; }

  var editId = document.getElementById('examEditId').value;
  var className = document.getElementById('examClass').value.trim();
  var distRank = document.getElementById('examDistRank').value;
  var schoolRank = document.getElementById('examSchoolRank').value;
  var classRank = document.getElementById('examClassRank').value;

  var scores = {};
  var assignedScores = {};
  var ranks = {};

  SUBJECTS.forEach(function(s) {
    var sv = document.getElementById('s_' + s.key).value;
    scores[s.key] = sv !== '' ? Number(sv) : null;

    // 三级排名
    var rd = document.getElementById('rd_' + s.key).value;
    var rs = document.getElementById('rs_' + s.key).value;
    var rc = document.getElementById('rc_' + s.key).value;
    var hasRank = (rd !== '' || rs !== '' || rc !== '');
    if (hasRank) {
      ranks[s.key] = {
        district: rd !== '' ? Number(rd) : null,
        school: rs !== '' ? Number(rs) : null,
        class: rc !== '' ? Number(rc) : null
      };
    } else {
      ranks[s.key] = null;
    }

    if (s.assigned) {
      var av = document.getElementById('a_' + s.key).value;
      assignedScores[s.key] = av !== '' ? Number(av) : null;
    }
  });

  if (editId) {
    var ex = exams.find(function(x) { return x.id === editId; });
    if (ex) {
      ex.name = name;
      ex.className = className;
      ex.scores = scores;
      ex.assignedScores = assignedScores;
      ex.ranks = ranks;
      ex.distRank = distRank ? Number(distRank) : null;
      ex.schoolRank = schoolRank ? Number(schoolRank) : null;
      ex.classRank = classRank ? Number(classRank) : null;
      ex.totalScore = calcTotal(ex);
    }
  } else {
    exams.push({
      id: 'ex-' + Date.now(),
      name: name,
      className: className,
      scores: scores,
      assignedScores: assignedScores,
      ranks: ranks,
      distRank: distRank ? Number(distRank) : null,
      schoolRank: schoolRank ? Number(schoolRank) : null,
      classRank: classRank ? Number(classRank) : null,
      totalScore: calcTotal({scores: scores, assignedScores: assignedScores}),
      note: ''
    });
  }

  closeExamModal();
  saveData();
  refreshAll();
}

function editExam(id) { showExamModal(id); }

function confirmDelExam(id) {
  var ex = exams.find(function(x) { return x.id === id; });
  if (!ex) return;
  if (confirm('确定删除「' + ex.name + '」的考试成绩吗？此操作不可撤销。')) {
    exams = exams.filter(function(x) { return x.id !== id; });
    saveData();
    refreshAll();
  }
}

// ==================== 初始化 ====================
loadData();
</script>

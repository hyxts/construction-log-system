<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2c2c2c">
<link rel="apple-touch-icon" href="/calligraphy/icon-192.svg">
<link rel="icon" type="image/svg+xml" href="/calligraphy/icon-512.svg">
<link rel="manifest" href="/calligraphy/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Ma+Shan+Zheng&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<!-- 硬笔书法免费CDN字体（字图CDN / 中文网字计划） -->
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/rmjzqpybxs/dist/瑞美加张清平硬笔行书/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/hlxsjt/dist/鸿雷行书简体/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/ysyrxk/dist/演示悠然小楷/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/jxzk/dist/江西拙楷/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/xiaolai/dist/小赖体/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/qtbfsxt/dist/千图笔锋手写体/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/lxgwwenkai/dist/霞鹜文楷/result.css">
<title>字帖生成器</title>
<style>
:root {
  --workspace-bg: #3a3a3a;
  --panel-bg: #f5f5f5;
  --panel-border: #d0d0d0;
  --text: #222;
  --muted: #666;
  --accent: #1a6db5;
  --accent-hover: #155a94;
  --danger: #c0392b;
  --input-bg: #fff;
  --shadow: 0 2px 8px rgba(0,0,0,.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  background: var(--workspace-bg);
  color: var(--text);
}

/* 顶部栏 */
.topbar {
  height: 44px;
  background: #2c2c2c;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  -webkit-app-region: drag;
}
.topbar h1 {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
}
.topbar .actions { display:flex; gap:10px; -webkit-app-region: no-drag; }
.topbar button {
  padding: 5px 14px;
  border-radius: 4px;
  border: none;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.topbar button:hover { opacity: .9; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: #555; color: #fff; }

/* 主体布局 */
.layout {
  display: flex;
  height: calc(100vh - 44px);
}

/* 左侧预览区 */
.preview-pane {
  flex: 1;
  background: var(--workspace-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.workspace {
  flex: 1;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px;
}
.paper-wrapper {
  position: relative;
  flex-shrink: 0;
}
.paper {
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,.25);
  width: 794px;
  height: 1123px;
  transform-origin: top center;
  overflow: hidden;
  position: relative;
}
.paper-header {
  text-align: center;
  padding: 28px 48px 20px;
}
.paper-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 4px;
}
.paper-subtitle {
  font-size: 11px;
  color: #999;
  margin-top: 4px;
}
.paper-grid {
  padding: 0 48px 48px;
}
.paper-grid.no-title { padding-top: 48px; }
.paper-grid > .grid-inner {
  display: grid;
  width: 100%;
  justify-content: center;
}

/* 缩放工具条 */
.zoom-bar {
  height: 40px;
  background: #323232;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border-top: 1px solid #444;
  flex-shrink: 0;
}
.zoom-bar button {
  width: 28px; height: 28px;
  border-radius: 4px;
  border: 1px solid #555;
  background: #444;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}
.zoom-bar button:hover { background: #555; }
.zoom-label {
  font-size: 12px;
  color: #ccc;
  min-width: 44px;
  text-align: center;
}

/* 右侧设置面板 */
.settings-pane {
  width: 340px;
  flex-shrink: 0;
  background: var(--panel-bg);
  border-left: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.settings-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.settings-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin: 16px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--panel-border);
}
.settings-title:first-child { margin-top: 0; }
.form-row {
  display: flex;
  align-items: center;
  min-height: 34px;
  margin-bottom: 10px;
  gap: 10px;
}
.form-row.label-top {
  align-items: flex-start;
  flex-direction: column;
  gap: 6px;
}
.form-row label {
  width: 90px;
  font-size: 12px;
  color: var(--text);
  text-align: right;
  flex-shrink: 0;
  line-height: 1.3;
}
.form-row.label-top label { width: 100%; text-align: left; }
.form-row .input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-row input[type="text"],
.form-row input[type="number"],
.form-row select,
.form-row textarea {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  font-size: 12px;
  background: var(--input-bg);
  color: var(--text);
  font-family: inherit;
}
.form-row input[type="color"] {
  width: 44px;
  height: 26px;
  padding: 0;
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  background: none;
  cursor: pointer;
}
.form-row input[type="number"] { text-align: right; }
.form-row textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}
.form-row input[type="checkbox"] {
  width: 16px; height: 16px;
  cursor: pointer;
}
.unit {
  font-size: 11px;
  color: var(--muted);
  min-width: 28px;
}
.hint {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  margin-top: 2px;
}

/* 底部保存按钮 */
.settings-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--panel-border);
  background: #eaeaea;
}
.btn-save {
  width: 100%;
  padding: 10px 0;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.btn-save:hover { background: var(--accent-hover); }

/* 格子 */
.cell {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-style: solid;
  border-width: 1.5px;
}
.cell-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}
.cell-text { line-height: 1; text-align: center; }
.cell-pinyin {
  font-size: 10px;
  line-height: 1;
  margin-top: 2px;
  min-height: 14px;
}
.cell-hint {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* 横线格 */
.cell.hline {
  border-top: none;
  border-left: none;
  border-right: none;
}

/* 空状态 */
.empty-hint {
  text-align: center;
  color: #999;
  padding: 80px 20px;
  font-size: 14px;
  line-height: 1.8;
}

/* 移动端 */
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .settings-pane {
    width: 100%;
    height: auto;
    border-left: none;
    border-top: 1px solid var(--panel-border);
    order: 2;
  }
  .preview-pane { order: 1; height: 50vh; }
  .workspace { padding: 12px; }
  .zoom-bar { display: none; }
}

/* 打印样式 */
@media print {
  body { background: #fff; overflow: visible; }
  .topbar, .settings-pane, .zoom-bar { display: none !important; }
  .layout { display: block; height: auto; }
  .preview-pane { overflow: visible; height: auto; }
  .workspace { padding: 0; display: block; }
  .paper-wrapper { position: static; }
  .paper {
    box-shadow: none;
    width: 210mm;
    height: 297mm;
    transform: none !important;
    margin: 0 auto;
    page-break-after: always;
  }
  @page { size: A4; margin: 0; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>字帖生成器</h1>
  <div class="actions">
    <button class="btn-secondary" onclick="resetAll()">重置</button>
    <button class="btn-primary" onclick="window.print()">保存 / 打印</button>
  </div>
</div>

<div class="layout">

  <!-- 左侧预览区 -->
  <div class="preview-pane">
    <div class="workspace" id="workspace">
      <div class="paper-wrapper">
        <div class="paper" id="paper">
          <div class="paper-header" id="paperHeader" style="display:none">
            <div class="paper-title" id="paperTitleEl"></div>
            <div class="paper-subtitle" id="paperSubtitle"></div>
          </div>
          <div class="paper-grid" id="paperGrid">
            <div class="empty-hint">请选择练习内容或输入自定义文字</div>
          </div>
        </div>
      </div>
    </div>
    <div class="zoom-bar">
      <button onclick="zoomOut()" title="缩小">-</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button onclick="zoomIn()" title="放大">+</button>
    </div>
  </div>

  <!-- 右侧设置面板 -->
  <div class="settings-pane">
    <div class="settings-scroll">

      <div class="settings-title">基础设置</div>
      <div class="form-row">
        <label for="fontType">字体类型</label>
        <div class="input-wrap">
          <select id="fontType" onchange="updateState('fontType', this.value)">
            <option value="临摹">临摹</option>
            <option value="描红">描红</option>
            <option value="半描">半描</option>
          </select>
        </div>
      </div>

      <div class="form-row label-top">
        <label for="customText">内容</label>
        <textarea id="customText" placeholder="在此输入要练习的文字，每行一个词或一句话..." oninput="updateState('content', this.value)"></textarea>
      </div>
      <div class="form-row">
        <label for="contentPreset">预设内容</label>
        <div class="input-wrap">
          <select id="contentPreset" onchange="selectPreset()">
            <option value="">-- 选择预设内容 --</option>
            <optgroup label="唐诗精选（20首）">
              <option value="poem1">静夜思 - 李白</option>
              <option value="poem2">春晓 - 孟浩然</option>
              <option value="poem3">登鹳雀楼 - 王之涣</option>
              <option value="poem4">悯农 - 李绅</option>
              <option value="poem5">咏鹅 - 骆宾王</option>
              <option value="poem6">望庐山瀑布 - 李白</option>
              <option value="poem7">江雪 - 柳宗元</option>
              <option value="poem8">赋得古原草送别 - 白居易</option>
              <option value="poem9">回乡偶书 - 贺知章</option>
              <option value="poem10">出塞 - 王昌龄</option>
              <option value="poem11">凉州词 - 王之涣</option>
              <option value="poem12">枫桥夜泊 - 张继</option>
              <option value="poem13">早发白帝城 - 李白</option>
              <option value="poem14">望天门山 - 李白</option>
              <option value="poem15">鹿柴 - 王维</option>
              <option value="poem16">送元二使安西 - 王维</option>
              <option value="poem17">九月九日忆山东兄弟 - 王维</option>
              <option value="poem18">江南春 - 杜牧</option>
              <option value="poem19">泊船瓜洲 - 王安石</option>
              <option value="poem20">忆江南 - 白居易</option>
            </optgroup>
            <optgroup label="宋词精选（10首）">
              <option value="ci1">水调歌头·明月几时有</option>
              <option value="ci2">念奴娇·赤壁怀古</option>
              <option value="ci3">声声慢·寻寻觅觅</option>
              <option value="ci4">雨霖铃·寒蝉凄切</option>
              <option value="ci5">蝶恋花·伫倚危楼</option>
              <option value="ci6">青玉案·东风夜放</option>
              <option value="ci7">浣溪沙·一曲新词</option>
              <option value="ci8">如梦令·常记溪亭</option>
              <option value="ci9">醉花阴·薄雾浓云</option>
              <option value="ci10">虞美人·春花秋月</option>
            </optgroup>
            <optgroup label="古文名篇">
              <option value="prose1">千字文（全文）</option>
              <option value="prose2">三字经（劝学篇）</option>
              <option value="prose3">弟子规（入则孝）</option>
              <option value="prose4">论语·学而篇</option>
              <option value="prose5">朱子家训（选段）</option>
            </optgroup>
            <optgroup label="常用字练习">
              <option value="basic">千字文百字（启蒙古文）</option>
              <option value="basic500">常用汉字500（按频序）</option>
              <option value="number">数字大写（壹贰叁肆伍）</option>
              <option value="name">百家姓（全文）</option>
              <option value="name48">常见姓氏48个</option>
            </optgroup>
            <optgroup label="偏旁部首">
              <option value="pianpang">常见偏旁部首</option>
            </optgroup>
            <optgroup label="散文名段">
              <option value="essay1">匆匆 - 朱自清</option>
              <option value="essay2">荷塘月色 - 朱自清</option>
              <option value="essay3">从百草园到三味书屋</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="input-wrap" style="justify-content:flex-start; padding-left:100px;">
          <input type="checkbox" id="onlyCommonChars" onchange="updateState('onlyCommonChars', this.checked)">
          <label for="onlyCommonChars" style="width:auto; text-align:left;">仅常用汉字</label>
        </div>
      </div>

      <div class="settings-title">版式设置</div>
      <div class="form-row">
        <label for="practiceType">练字类型</label>
        <div class="input-wrap">
          <select id="practiceType" onchange="updateState('practiceType', this.value)">
            <option value="全描">全描</option>
            <option value="半描">半描</option>
            <option value="临摹">临摹</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label for="gridType">网格类型</label>
        <div class="input-wrap">
          <select id="gridType" onchange="updateState('grid', this.value)">
            <option value="tian">田字格</option>
            <option value="mi">米字格</option>
            <option value="hui">回宫格</option>
            <option value="square">方格</option>
            <option value="hline">横线格</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label for="cols">每行格数</label>
        <div class="input-wrap">
          <select id="cols" onchange="updateState('cols', parseInt(this.value))">
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6" selected>6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label for="cellSize">格子大小</label>
        <div class="input-wrap">
          <input type="number" id="cellSize" value="1.00" step="0.05" min="0.5" max="2" oninput="updateState('cellSizeScale', parseFloat(this.value)||1)">
          <span class="unit">倍</span>
        </div>
      </div>
      <div class="form-row">
        <label for="fontSize">字体大小</label>
        <div class="input-wrap">
          <input type="number" id="fontSize" value="1.00" step="0.05" min="0.3" max="2" oninput="updateState('fontSizeScale', parseFloat(this.value)||1)">
          <span class="unit">倍</span>
        </div>
      </div>
      <div class="form-row">
        <label for="extraEmptyRows">附加空行</label>
        <div class="input-wrap">
          <input type="number" id="extraEmptyRows" value="0" step="1" min="0" max="5" oninput="updateState('extraEmptyRows', parseInt(this.value)||0)">
          <span class="unit">行</span>
        </div>
      </div>

      <div class="settings-title">样式设置</div>
      <div class="form-row">
        <label for="fontSelect">字体名称</label>
        <div class="input-wrap">
          <select id="fontSelect" onchange="updateState('font', this.value)">
            <optgroup label="楷书类">
              <option value="KaiTi, STKaiti, '楷体', serif">楷体（系统默认）</option>
              <option value="'Noto Serif SC', STKaiti, '楷体', serif">思源宋体（谷歌）</option>
              <option value="'Ma Shan Zheng', KaiTi, STKaiti, cursive">马山正楷（谷歌）</option>
            </optgroup>
            <optgroup label="硬笔名家楷书（需本地安装）">
              <option value="'荆霄鹏楷书', 'JXPKaiShu', KaiTi, STKaiti, serif">荆霄鹏楷书</option>
              <option value="'吴玉生楷书', 'WYSKaiShu', KaiTi, STKaiti, serif">吴玉生楷书</option>
              <option value="'田英章楷书', 'TYZKaiShu', KaiTi, STKaiti, serif">田英章楷书</option>
            </optgroup>
            <optgroup label="硬笔名家行楷（需本地安装）">
              <option value="'吴玉生行楷', 'WYSXingKai', 'STXingkai', KaiTi, serif">吴玉生行楷</option>
            </optgroup>
            <optgroup label="硬笔书法-CDN免费字体">
              <option value="'瑞美加张清平硬笔行书', 'STXingkai', KaiTi, serif">张清平硬笔行书</option>
              <option value="'鸿雷行书简体', 'STXingkai', KaiTi, serif">鸿雷行书简体</option>
              <option value="'演示悠然小楷', KaiTi, STKaiti, serif">演示悠然小楷</option>
              <option value="'江西拙楷', KaiTi, STKaiti, serif">江西拙楷</option>
              <option value="'霞鹜文楷', KaiTi, STKaiti, serif">霞鹜文楷</option>
              <option value="'千图笔锋手写体', KaiTi, STKaiti, serif">千图笔锋手写体</option>
              <option value="'小赖体', KaiTi, STKaiti, serif">小赖体</option>
            </optgroup>
            <optgroup label="行书类">
              <option value="'STXingkai', '华文行楷', KaiTi, serif">华文行楷</option>
              <option value="'ZCOOL QingKe HuangYou', 'STXingkai', cursive">黄油体（趣味）</option>
              <option value="'ZCOOL XiaoWei', KaiTi, serif">小薇体（手写）</option>
            </optgroup>
            <optgroup label="宋体/仿宋类">
              <option value="'FangSong', STFangsong, '仿宋', serif">仿宋</option>
              <option value="SimSun, STSong, '宋体', serif">宋体</option>
              <option value="'Noto Serif SC', SimSun, STSong, serif">思源宋体</option>
            </optgroup>
            <optgroup label="黑体/无衬线类">
              <option value="'SimHei', STHeiti, '黑体', sans-serif">黑体</option>
              <option value="'Noto Sans SC', 'Microsoft YaHei', sans-serif">思源黑体</option>
              <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
            </optgroup>
            <optgroup label="其他书体">
              <option value="'LiSu', STLiti, '隶书', serif">隶书</option>
              <option value="'STXinwei', '华文新魏', serif">新魏</option>
              <option value="'YouYuan', '幼圆', sans-serif">幼圆</option>
              <option value="'FZShuTi', '方正舒体', serif">方正舒体</option>

// ==================== 状态管理 ====================
const state = {
  fontType: '临摹',
  content: '',
  onlyCommonChars: false,
  practiceType: '全描',
  grid: 'mi',
  cols: 6,
  cellSizeScale: 1,

  extraEmptyRows: 0,

  gridColor: '#c0392b',
  textColor: '#222222',
  opacity: 1,
  pinyin: false,
  title: '',
  zoom: 1
};

function updateState(key, value) {
  state[key] = value;
  if (key === 'gridColor') {
    document.getElementById('gridColor').value = normalizeHex(value) || '#c0392b';
    document.getElementById('gridColorText').value = value;
  }
  if (key === 'textColor') {
    document.getElementById('textColor').value = normalizeHex(value) || '#222222';
    document.getElementById('textColorText').value = value;
  }
  updatePreview();
}

function normalizeHex(color) {
  const ctx = document.createElement('canvas').getContext('2d');
  if (!ctx) return null;
  ctx.fillStyle = color;
  const hex = ctx.fillStyle;
  return hex && hex.startsWith('#') ? hex : null;
}

function selectPreset() {
  const val = document.getElementById('contentPreset').value;
  if (!val) return;
  const text = PRESETS[val] || '';
  document.getElementById('customText').value = text;
  state.content = text;
  document.getElementById('contentPreset').value = val;
  updatePreview();
}

// ==================== 颜色工具 ====================
function hexToRgba(hex, alpha) {
  const ctx = document.createElement('canvas').getContext('2d');
  if (!ctx) return `rgba(0,0,0,${alpha})`;
  ctx.fillStyle = hex;
  const rgb = ctx.fillStyle;
  const r = parseInt(rgb.slice(1, 3), 16);
  const g = parseInt(rgb.slice(3, 5), 16);
  const b = parseInt(rgb.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ==================== 缩放 ====================
function applyZoom() {
  const paper = document.getElementById('paper');
  paper.style.transform = `scale(${state.zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(state.zoom * 100) + '%';
}
function zoomIn() {
  state.zoom = Math.min(1.5, state.zoom + 0.1);
  applyZoom();
}
function zoomOut() {
  state.zoom = Math.max(0.4, state.zoom - 0.1);
  applyZoom();
}

// ==================== 获取拼音 ====================
function getPinyin(char) {
  return PINYIN_DB[char] || '';
}

// ==================== 渲染字帖 ====================
function updatePreview() {
  const grid = document.getElementById('paperGrid');
  const header = document.getElementById('paperHeader');
  const titleEl = document.getElementById('paperTitleEl');

  // 标题
  if (state.title) {
    header.style.display = 'block';
    titleEl.textContent = state.title;
    document.getElementById('paperSubtitle').textContent = state.practiceType === '临摹' ? '临写练习' : (state.practiceType === '半描' ? '半描练习' : '描红练习');
    grid.classList.remove('no-title');
  } else {
    header.style.display = 'none';
    grid.classList.add('no-title');
  }

  // 内容
  let text = state.content || document.getElementById('customText').value || '';
  if (!text.trim()) {
    grid.innerHTML = '<div class="empty-hint">请选择练习内容或输入自定义文字</div>';
    return;
  }

  // 仅常用汉字过滤
  if (state.onlyCommonChars) {
    text = [...text].filter(ch => COMMON_CHARS.has(ch) || ch === '\n').join('');
  }

  const linesRaw = text.split('\n').filter(l => l.trim());
  const lines = [];
  for (const line of linesRaw) {
    lines.push(line);
    for (let i = 0; i < state.extraEmptyRows; i++) {
      lines.push('');
    }
  }

  const cols = state.cols;

  // A4纸可用区域
  const marginX = 48;
  const marginY = 48;
  const paperW = 794;
  const paperH = 1123;
  const headerH = state.title ? 68 : 0;
  const availableW = paperW - marginX * 2;
  const availableH = paperH - marginY * 2 - headerH;

  // 统计总字符数
  let totalCells = 0;
  const lineChars = [];
  for (const line of lines) {
    const chars = [...line.trim()].filter(c => c !== ' ');
    lineChars.push(chars.length);
    totalCells += Math.ceil(chars.length / cols) * cols;
  }
  const totalRows = Math.max(1, Math.ceil(totalCells / cols));

  // 根据宽度计算格子大小
  let cellSize = Math.floor(availableW / cols);

  // 检查高度是否放得下
  const neededH = totalRows * cellSize;
  if (neededH > availableH) {
    cellSize = Math.floor(availableH / totalRows);
    if (cellSize * cols > availableW) {
      cellSize = Math.floor(Math.min(availableW / cols, availableH / totalRows));
    }
  }
  if (cellSize < 28) cellSize = 28;

  // 应用格子大小缩放
  cellSize = Math.round(cellSize * state.cellSizeScale);
  const maxCellW = Math.floor(availableW / cols);
  const maxCellH = Math.floor(availableH / totalRows);
  if (cellSize > maxCellW) cellSize = maxCellW;
  if (cellSize > maxCellH && totalRows > 0) cellSize = maxCellH;
  if (cellSize < 20) cellSize = 20;

  // 颜色
  const gridColor = state.gridColor || '#c0392b';
  const textColor = state.textColor || '#222222';
  const opacity = Math.max(.1, Math.min(1, state.opacity));
  const gridRgba = hexToRgba(gridColor, opacity);
  const textRgba = hexToRgba(textColor, opacity);
  const hintRgba = hexToRgba(gridColor, opacity * .6);

  // 字体大小：默认占格子的65%，再乘以缩放
  const baseFontRatio = 0.65;
  const fontSize = Math.round(cellSize * baseFontRatio * state.fontSizeScale);
  const pySize = Math.max(8, Math.round(fontSize * 0.22));

  // 描红透明度
  const isTrace = state.practiceType === '全描';
  const isHalfTrace = state.practiceType === '半描';
  const traceRgba = hexToRgba(textColor, opacity * .15);

  let cellClasses = ['cell'];
  if (state.grid === 'tian') cellClasses.push('tian');
  else if (state.grid === 'mi') cellClasses.push('mi');
  else if (state.grid === 'hui') cellClasses.push('hui');
  else if (state.grid === 'square') cellClasses.push('square');
  else if (state.grid === 'hline') cellClasses.push('hline');

  const cellClass = cellClasses.join(' ');

  // 构建背景提示层（田字格/米字格/回宫格）
  let hintStyle = '';
  if (state.grid === 'tian') {
    hintStyle = `background:
      linear-gradient(to right, transparent calc(50% - .5px), ${hintRgba} calc(50% - .5px), ${hintRgba} calc(50% + .5px), transparent calc(50% + .5px)),
      linear-gradient(to bottom, transparent calc(50% - .5px), ${hintRgba} calc(50% - .5px), ${hintRgba} calc(50% + .5px), transparent calc(50% + .5px));`;
  } else if (state.grid === 'mi') {
    hintStyle = `background:
      linear-gradient(to right, transparent calc(50% - .5px), ${hintRgba} calc(50% - .5px), ${hintRgba} calc(50% + .5px), transparent calc(50% + .5px)),
      linear-gradient(to bottom, transparent calc(50% - .5px), ${hintRgba} calc(50% - .5px), ${hintRgba} calc(50% + .5px), transparent calc(50% + .5px)),
      linear-gradient(135deg, transparent calc(50% - .5px), ${hintRgba} calc(50% - .5px), ${hintRgba} calc(50% + .5px), transparent calc(50% + .5px)),
      linear-gradient(45deg, transparent calc(50% - .5px), ${hintRgba} calc(50% - .5px), ${hintRgba} calc(50% + .5px), transparent calc(50% + .5px));`;
  }

  let html = '';
  html += `<div class="grid-inner" style="grid-template-columns:repeat(${cols}, ${cellSize}px);grid-auto-rows:${cellSize}px">`;

  let globalCellIndex = 0;
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const chars = [...line.trim()].filter(c => c !== ' ');
    const filledCount = Math.max(cols, Math.ceil(chars.length / cols) * cols);
    for (let i = 0; i < filledCount; i++) {
      const ch = i < chars.length ? chars[i] : '';
      const py = state.pinyin && ch ? getPinyin(ch) : '';
      const rowIndex = Math.floor(globalCellIndex / cols);

      let cellTextColor = textRgba;
      if (isTrace) {
        cellTextColor = traceRgba;
      } else if (isHalfTrace) {
        cellTextColor = (rowIndex % 2 === 0) ? traceRgba : textRgba;
      }

      const borderStyle = state.grid === 'hline'
        ? `border-bottom-color:${gridRgba};`
        : `border-color:${gridRgba};`;

      html += `<div class="${cellClass}" style="width:${cellSize}px;height:${cellSize}px;${borderStyle}">`;
      if (hintStyle && ch && state.grid !== 'square' && state.grid !== 'hline') {
        html += `<div class="cell-hint" style="${hintStyle}"></div>`;
      }
      html += `<div class="cell-inner">`;
      if (state.pinyin) {
        html += `<span class="cell-pinyin" style="font-size:${pySize}px;color:${hexToRgba(textColor, opacity*.5)};min-height:14px">${py}</span>`;
      }
      html += `<span class="cell-text" style="font-size:${fontSize}px;font-family:${state.font};color:${cellTextColor}">${ch}</span>`;
      html += `</div></div>`;
      globalCellIndex++;
    }
  }

  html += '</div>';
  grid.innerHTML = html;
}

  state.content = '';
  state.onlyCommonChars = false;
  state.practiceType = '全描';
  state.grid = 'mi';
  state.cols = 6;
  state.cellSizeScale = 1;
  state.fontSizeScale = 1;
  state.extraEmptyRows = 0;
  state.font = "KaiTi, STKaiti, '楷体', serif";
  state.gridColor = '#c0392b';
  state.textColor = '#222222';
  state.opacity = 1;
  state.pinyin = false;
  state.title = '';
  state.zoom = 1;

  document.getElementById('fontType').value = '临摹';
  document.getElementById('customText').value = '';
  document.getElementById('contentPreset').value = '';
  document.getElementById('onlyCommonChars').checked = false;
  document.getElementById('practiceType').value = '全描';
  document.getElementById('gridType').value = 'mi';
  document.getElementById('cols').value = '6';
  document.getElementById('cellSize').value = '1.00';
  document.getElementById('fontSize').value = '1.00';
  document.getElementById('extraEmptyRows').value = '0';
  document.getElementById('fontSelect').value = "KaiTi, STKaiti, '楷体', serif";
  document.getElementById('gridColor').value = '#c0392b';
  document.getElementById('gridColorText').value = '#c0392b';
  document.getElementById('textColor').value = '#222222';
  document.getElementById('textColorText').value = '#222222';
  document.getElementById('opacity').value = '1.00';
  document.getElementById('showPinyin').checked = false;
  document.getElementById('paperTitle').value = '';

  applyZoom();
  updatePreview();
}

// ==================== 初始化 ====================

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2c1810">
<link rel="apple-touch-icon" href="/calligraphy/icon-192.svg">
<link rel="icon" type="image/svg+xml" href="/calligraphy/icon-512.svg">
<link rel="manifest" href="/calligraphy/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Ma+Shan+Zheng&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<!-- 硬笔书法免费CDN字体（字图CDN / 中文网字计划） -->
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/rmjzqpybxs/dist/瑞美加张清平硬笔行书/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/hlxsjt/dist/鸿雷行书简体/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/ysyrxk/dist/演示悠然小楷/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/jxzk/dist/江西拙楷/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/xiaolai/dist/小赖体/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/qtbfsxt/dist/千图笔锋手写体/result.css">
<link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/lxgwwenkai/dist/霞鹜文楷/result.css">
<title>字帖设计</title>
<style>
:root {
  --bg: #faf6f0;
  --card: #fff;
  --border: #e0d8cc;
  --text: #2c1810;
  --muted: #8c8078;
  --accent: #8b4513;
  --accent-light: #d4a574;
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 顶部栏 */
.topbar {
  background: #2c1810;
  color: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}
.topbar h1 {
  font-size: 17px;
  font-weight: 600;
  font-family: KaiTi, STKaiti, serif;
  white-space: nowrap;
}
.topbar .subtitle {
  font-size: 11px;
  opacity: .7;
  display: none;
}
.topbar .actions { display:flex; gap:8px; flex-shrink:0; }
.topbar button {
  padding: 7px 16px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .15s;
}
.topbar button:active { opacity:.8; }
.btn-print { background: var(--accent-light); color: #2c1810; }
.btn-reset { background: rgba(255,255,255,.15); color: #fff; }

/* 主体布局 */
.layout {
  display: flex;
  min-height: calc(100vh - 48px);
  max-width: 1300px;
  margin: 0 auto;
}
.sidebar {
  width: 320px;
  flex-shrink: 0;
  padding: 16px;
  overflow-y: auto;
  max-height: calc(100vh - 48px);
  position: sticky;
  top: 48px;
  background: transparent;
}
.main {
  flex: 1;
  padding: 16px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* 设置面板 */
.panel {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
}
.panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent-light);
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-row {
  margin-bottom: 12px;
}
.panel-row:last-child { margin-bottom:0; }
.panel-row label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 500;
}
.panel-row .opts {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.panel-row .opt {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  background: #fff;
  transition: all .15s;
  user-select: none;
  white-space: nowrap;
}
.panel-row .opt:hover { border-color: var(--accent-light); }
.panel-row .opt.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.panel-row select, .panel-row textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: #fff;
  font-family: inherit;
  color: var(--text);
  resize: vertical;
}
.panel-row textarea {
  min-height: 80px;
  line-height: 1.6;
}
.panel-row input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}
.range-val {
  text-align: right;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* A4纸预览 */
.paper-wrapper {
  position: sticky;
  top: 64px;
}
.paper {
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  position: relative;
  /* A4 ratio: 1:√2 */
  width: 794px;
  height: 1123px;
  transform-origin: top center;
  overflow: hidden;
}
.paper-header {
  text-align: center;
  padding: 28px 48px 20px;
}
.paper-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 4px;
}
.paper-subtitle {
  font-size: 11px;
  color: #999;
  margin-top: 4px;
}
.paper-grid {
  padding: 0 48px 48px;
}
.paper-grid.no-title {
  padding-top: 48px;
}
.paper-grid > .grid-inner {
  display: grid;
  width: 100%;
  justify-content: center;
}

/* 格子 */
.cell {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 1.5px solid #333;
}
.cell-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}
.cell-text {
  line-height: 1;
  text-align: center;
}
.cell-pinyin {
  font-size: 10px;
  color: #999;
  line-height: 1;
  margin-top: 2px;
  min-height: 14px;
}

/* 田字格虚线 */
.cell.tian::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(to right, transparent calc(50% - .5px), rgba(0,0,0,.15) calc(50% - .5px), rgba(0,0,0,.15) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(to bottom, transparent calc(50% - .5px), rgba(0,0,0,.15) calc(50% - .5px), rgba(0,0,0,.15) calc(50% + .5px), transparent calc(50% + .5px));
}

/* 米字格 = 田字格 + 对角线 */
.cell.mi::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(to right, transparent calc(50% - .5px), rgba(0,0,0,.15) calc(50% - .5px), rgba(0,0,0,.15) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(to bottom, transparent calc(50% - .5px), rgba(0,0,0,.15) calc(50% - .5px), rgba(0,0,0,.15) calc(50% + .5px), transparent calc(50% + .5px));
}
.cell.mi::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(135deg, transparent calc(50% - .5px), rgba(0,0,0,.1) calc(50% - .5px), rgba(0,0,0,.1) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(45deg, transparent calc(50% - .5px), rgba(0,0,0,.1) calc(50% - .5px), rgba(0,0,0,.1) calc(50% + .5px), transparent calc(50% + .5px));
}

/* 回宫格 = 内框 */
.cell.hui::before {
  content: '';
  position: absolute;
  inset: 18%;
  z-index: 0;
  border: 1.5px dashed rgba(0,0,0,.15);
}

/* 方格 = 无内线 */
.cell.square::before { display:none; }
.cell.square::after { display:none; }

/* 横线格 */
.cell.hline {
  border-top: none;
  border-left: none;
  border-right: none;
}
.cell.hline::before { display:none; }
.cell.hline::after { display:none; }

/* 描红 */
.cell.trace .cell-text { color: rgba(0,0,0,.15); }
.cell.trace .cell-pinyin { color: rgba(0,0,0,.1); }

/* 格线颜色 */
.cell.red-line { border-color: #c0392b; }
.cell.red-line::before, .cell.red-line::after {
  --line-color: rgba(192,57,43,.2);
}
.cell.red-line.tian::before {
  background:
    linear-gradient(to right, transparent calc(50% - .5px), rgba(192,57,43,.2) calc(50% - .5px), rgba(192,57,43,.2) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(to bottom, transparent calc(50% - .5px), rgba(192,57,43,.2) calc(50% - .5px), rgba(192,57,43,.2) calc(50% + .5px), transparent calc(50% + .5px));
}
.cell.red-line.mi::before {
  background:
    linear-gradient(to right, transparent calc(50% - .5px), rgba(192,57,43,.2) calc(50% - .5px), rgba(192,57,43,.2) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(to bottom, transparent calc(50% - .5px), rgba(192,57,43,.2) calc(50% - .5px), rgba(192,57,43,.2) calc(50% + .5px), transparent calc(50% + .5px));
}
.cell.red-line.mi::after {
  background:
    linear-gradient(135deg, transparent calc(50% - .5px), rgba(192,57,43,.15) calc(50% - .5px), rgba(192,57,43,.15) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(45deg, transparent calc(50% - .5px), rgba(192,57,43,.15) calc(50% - .5px), rgba(192,57,43,.15) calc(50% + .5px), transparent calc(50% + .5px));
}
.cell.red-line.hui::before { border-color: rgba(192,57,43,.3); }

/* 缩放控制 */
.zoom-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  margin-bottom: 10px;
}
.zoom-controls button {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
}
.zoom-controls button:hover { background: #f5f0e8; }
.zoom-label { font-size: 12px; color: var(--muted); min-width: 42px; text-align: center; }

/* 空状态 */
.empty-hint {
  text-align: center;
  color: var(--muted);
  padding: 60px 20px;
  font-size: 14px;
  line-height: 1.8;
}

/* 移动端底部上滑面板 */
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-height: none;
    position: static;
    padding: 12px;
    order: 2;
  }
  .main {
    order: 1;
    padding: 12px;
    overflow-x: auto;
  }
  .paper-wrapper { position: static; }
  .topbar .subtitle { display: inline; }
  .topbar h1 { font-size: 15px; }
  .zoom-controls { display: none; }
}

/* 打印样式 */
@media print {
  body { background: #fff; }
  .topbar, .sidebar, .zoom-controls { display: none !important; }
  .layout { display: block; max-width: none; }
  .main { padding: 0; display: block; }
  .paper-wrapper { position: static; }
  .paper {
    box-shadow: none;
    width: 210mm;
    height: 297mm;
    transform: none !important;
    margin: 0 auto;
    page-break-after: always;
  }
  @page { size: A4; margin: 0; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>字帖设计</h1>
    <span class="subtitle">硬笔书法</span>
  </div>
  <div class="actions">
    <button class="btn-reset" onclick="resetAll()" title="恢复默认">重置</button>
    <button class="btn-print" onclick="window.print()" title="打印或导出PDF">打印 / 导出PDF</button>
  </div>
</div>

<div class="layout">

  <!-- 左侧设置面板 -->
  <div class="sidebar" id="sidebar">

    <div class="panel">
      <div class="panel-title">网格类型</div>
      <div class="panel-row">
        <div class="opts" id="gridOpts">
          <span class="opt active" data-v="tian">田字格</span>
          <span class="opt" data-v="mi">米字格</span>
          <span class="opt" data-v="hui">回宫格</span>
          <span class="opt" data-v="square">方格</span>
          <span class="opt" data-v="hline">横线格</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">字体选择</div>
      <div class="panel-row">
        <select id="fontSelect">
          <optgroup label="楷书类">
            <option value="KaiTi, STKaiti, '楷体', serif">楷体（系统默认）</option>
            <option value="'Noto Serif SC', STKaiti, '楷体', serif">思源宋体（谷歌）</option>
            <option value="'Ma Shan Zheng', KaiTi, STKaiti, cursive">马山正楷（谷歌）</option>
          </optgroup>
          <optgroup label="硬笔名家楷书（需本地安装）">
            <option value="'荆霄鹏楷书', 'JXPKaiShu', KaiTi, STKaiti, serif">荆霄鹏楷书</option>
            <option value="'吴玉生楷书', 'WYSKaiShu', KaiTi, STKaiti, serif">吴玉生楷书</option>
            <option value="'田英章楷书', 'TYZKaiShu', KaiTi, STKaiti, serif">田英章楷书</option>
          </optgroup>
          <optgroup label="硬笔名家行楷（需本地安装）">
            <option value="'吴玉生行楷', 'WYSXingKai', 'STXingkai', KaiTi, serif">吴玉生行楷</option>
          </optgroup>
          <optgroup label="硬笔书法-CDN免费字体">
            <option value="'瑞美加张清平硬笔行书', 'STXingkai', KaiTi, serif">张清平硬笔行书</option>
            <option value="'鸿雷行书简体', 'STXingkai', KaiTi, serif">鸿雷行书简体</option>
            <option value="'演示悠然小楷', KaiTi, STKaiti, serif">演示悠然小楷</option>
            <option value="'江西拙楷', KaiTi, STKaiti, serif">江西拙楷</option>
            <option value="'霞鹜文楷', KaiTi, STKaiti, serif">霞鹜文楷</option>
            <option value="'千图笔锋手写体', KaiTi, STKaiti, serif">千图笔锋手写体</option>
            <option value="'小赖体', KaiTi, STKaiti, serif">小赖体</option>
          </optgroup>
          <optgroup label="行书类">
            <option value="'STXingkai', '华文行楷', KaiTi, serif">华文行楷</option>
            <option value="'ZCOOL QingKe HuangYou', 'STXingkai', cursive">黄油体（趣味）</option>
            <option value="'ZCOOL XiaoWei', KaiTi, serif">小薇体（手写）</option>
          </optgroup>
          <optgroup label="宋体/仿宋类">
            <option value="'FangSong', STFangsong, '仿宋', serif">仿宋</option>
            <option value="SimSun, STSong, '宋体', serif">宋体</option>
            <option value="'Noto Serif SC', SimSun, STSong, serif">思源宋体</option>
          </optgroup>
          <optgroup label="黑体/无衬线类">
            <option value="'SimHei', STHeiti, '黑体', sans-serif">黑体</option>
            <option value="'Noto Sans SC', 'Microsoft YaHei', sans-serif">思源黑体</option>
            <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
          </optgroup>
          <optgroup label="其他书体">
            <option value="'LiSu', STLiti, '隶书', serif">隶书</option>
            <option value="'STXinwei', '华文新魏', serif">新魏</option>
            <option value="'YouYuan', '幼圆', sans-serif">幼圆</option>
            <option value="'FZShuTi', '方正舒体', serif">方正舒体</option>
            <option value="'FZYaoti', '方正姚体', serif">方正姚体</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">练习内容</div>
      <div class="panel-row">
        <select id="contentPreset" onchange="selectPreset()">
          <option value="">-- 选择预设内容 --</option>
          <optgroup label="唐诗精选（20首）">
            <option value="poem1">静夜思 - 李白</option>
            <option value="poem2">春晓 - 孟浩然</option>
            <option value="poem3">登鹳雀楼 - 王之涣</option>
            <option value="poem4">悯农 - 李绅</option>
            <option value="poem5">咏鹅 - 骆宾王</option>
            <option value="poem6">望庐山瀑布 - 李白</option>
            <option value="poem7">江雪 - 柳宗元</option>
            <option value="poem8">赋得古原草送别 - 白居易</option>
            <option value="poem9">回乡偶书 - 贺知章</option>
            <option value="poem10">出塞 - 王昌龄</option>
            <option value="poem11">凉州词 - 王之涣</option>
            <option value="poem12">枫桥夜泊 - 张继</option>
            <option value="poem13">早发白帝城 - 李白</option>
            <option value="poem14">望天门山 - 李白</option>
            <option value="poem15">鹿柴 - 王维</option>
            <option value="poem16">送元二使安西 - 王维</option>
            <option value="poem17">九月九日忆山东兄弟 - 王维</option>
            <option value="poem18">江南春 - 杜牧</option>
            <option value="poem19">泊船瓜洲 - 王安石</option>
            <option value="poem20">忆江南 - 白居易</option>
          </optgroup>
          <optgroup label="宋词精选（10首）">
            <option value="ci1">水调歌头·明月几时有</option>
            <option value="ci2">念奴娇·赤壁怀古</option>
            <option value="ci3">声声慢·寻寻觅觅</option>
            <option value="ci4">雨霖铃·寒蝉凄切</option>
            <option value="ci5">蝶恋花·伫倚危楼</option>
            <option value="ci6">青玉案·东风夜放</option>
            <option value="ci7">浣溪沙·一曲新词</option>
            <option value="ci8">如梦令·常记溪亭</option>
            <option value="ci9">醉花阴·薄雾浓云</option>
            <option value="ci10">虞美人·春花秋月</option>
          </optgroup>
          <optgroup label="古文名篇">
            <option value="prose1">千字文（全文）</option>
            <option value="prose2">三字经（劝学篇）</option>
            <option value="prose3">弟子规（入则孝）</option>
            <option value="prose4">论语·学而篇</option>
            <option value="prose5">朱子家训（选段）</option>
          </optgroup>
          <optgroup label="常用字练习">
            <option value="basic">千字文百字（启蒙古文）</option>
            <option value="basic500">常用汉字500（按频序）</option>
            <option value="number">数字大写（壹贰叁肆伍）</option>
            <option value="name">百家姓（全文）</option>
            <option value="name48">常见姓氏48个</option>
          </optgroup>
          <optgroup label="偏旁部首">
            <option value="pianpang">常见偏旁部首</option>
          </optgroup>
          <optgroup label="散文名段">
            <option value="essay1">匆匆 - 朱自清</option>
            <option value="essay2">荷塘月色 - 朱自清</option>
            <option value="essay3">从百草园到三味书屋</option>
          </optgroup>
        </select>
      </div>
      <div class="panel-row">
        <label>或输入自定义内容（每行一字或词语）</label>
        <textarea id="customText" placeholder="在此输入要练习的文字，每行一个词或一句话..." oninput="updatePreview()"></textarea>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">显示设置</div>

// ==================== 预设选择 ====================
function selectPreset() {
  const val = document.getElementById('contentPreset').value;
  if (!val) return;
  const text = PRESETS[val] || '';
  document.getElementById('customText').value = text;
  state.content = text;
  document.getElementById('contentPreset').value = val;
  updatePreview();
}

// ==================== 设置切换 ====================
function setupToggleGroup(id, stateKey, callback) {
  const container = document.getElementById(id);
  if (!container) return;
  container.querySelectorAll('.opt').forEach(opt => {
    opt.addEventListener('click', () => {
      container.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      const val = opt.dataset.v;
      if (stateKey === 'trace') state[stateKey] = val === '1';
      else if (stateKey === 'pinyin') state[stateKey] = val === '1';
      else state[stateKey] = val;
      callback();
    });
  });
}

setupToggleGroup('gridOpts', 'grid', updatePreview);
setupToggleGroup('sizeOpts', 'fontSize', updatePreview);
setupToggleGroup('colsOpts', 'cols', () => { state.cols = parseInt(state.cols); updatePreview(); });
setupToggleGroup('lineColorOpts', 'lineColor', updatePreview);
setupToggleGroup('traceOpts', 'trace', updatePreview);
setupToggleGroup('pinyinOpts', 'pinyin', updatePreview);

document.getElementById('fontSelect').addEventListener('change', function() {
  state.font = this.value;
  updatePreview();
});

document.getElementById('customText').addEventListener('input', function() {
  state.content = this.value;
  updatePreview();
});

document.getElementById('paperTitle').addEventListener('input', function() {
  state.title = this.value;
  updatePreview();
});

// ==================== 缩放 ====================
function applyZoom() {
  const paper = document.getElementById('paper');
  paper.style.transform = `scale(${state.zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(state.zoom * 100) + '%';
}
function zoomIn() {
  state.zoom = Math.min(1.5, state.zoom + 0.1);
  applyZoom();
}
function zoomOut() {
  state.zoom = Math.max(0.4, state.zoom - 0.1);
  applyZoom();
}

// ==================== 获取拼音 ====================
function getPinyin(char) {
  return PINYIN_DB[char] || '';
}

// ==================== 渲染字帖 ====================
function updatePreview() {
  const grid = document.getElementById('paperGrid');
  const header = document.getElementById('paperHeader');
  const titleEl = document.getElementById('paperTitleEl');

  // 标题
  if (state.title) {
    header.style.display = 'block';
    titleEl.textContent = state.title;
    document.getElementById('paperSubtitle').textContent = state.trace ? '描红临摹' : '临写练习';
    grid.classList.remove('no-title');
  } else {
    header.style.display = 'none';
    grid.classList.add('no-title');
  }

  // 内容
  const text = state.content || document.getElementById('customText').value || '';
  if (!text.trim()) {
    grid.innerHTML = '<div class="empty-hint">请选择练习内容或输入自定义文字</div>';
    return;
  }

  const lines = text.split('\n').filter(l => l.trim());
  const cols = state.cols;

  // A4纸可用区域：794 - 48*2 = 698px，高度：1123 - 48*2(边距) - 标题区(约68) = 959px
  const marginX = 48;
  const marginY = 48;
  const paperW = 794;
  const paperH = 1123;
  const headerH = state.title ? 68 : 0;
  const availableW = paperW - marginX * 2;
  const availableH = paperH - marginY * 2 - headerH;

  // 字号系数（控制字体占格子的比例）
  const sizeCoef = { small: 0.55, medium: 0.65, large: 0.75 };
  const coef = sizeCoef[state.fontSize] || 0.65;

  // 统计总字符数（不补空行，计算实际需要多少行）
  let totalChars = 0;
  const lineChars = [];
  for (const line of lines) {
    const chars = [...line.trim()].filter(c => c !== ' ');
    lineChars.push(chars.length);
    totalChars += chars.length;
  }
  // 加上行末补空：每行都补齐到 cols 的倍数
  let totalCells = 0;
  for (const lc of lineChars) {
    totalCells += Math.ceil(lc / cols) * cols;
  }
  const totalRows = Math.ceil(totalCells / cols);

  // 根据宽度计算格子大小
  let cellSize = Math.floor(availableW / cols);

  // 检查高度是否放得下
  const neededH = totalRows * cellSize;
  if (neededH > availableH) {
    // 高度不够，按高度反推
    cellSize = Math.floor(availableH / totalRows);
    // 同时确保宽度也不溢出
    if (cellSize * cols > availableW) {
      cellSize = Math.floor(Math.min(availableW / cols, availableH / totalRows));
    }
  }
  // 确保最小尺寸
  if (cellSize < 28) cellSize = 28;

  // 构建格子CSS类
  let cellClasses = ['cell'];
  if (state.grid === 'tian') cellClasses.push('tian');
  else if (state.grid === 'mi') cellClasses.push('mi');
  else if (state.grid === 'hui') cellClasses.push('hui');
  else if (state.grid === 'square') cellClasses.push('square');
  else if (state.grid === 'hline') cellClasses.push('hline');
  if (state.lineColor === 'red') cellClasses.push('red-line');
  if (state.trace) cellClasses.push('trace');

  const cellClass = cellClasses.join(' ');

  let html = '';
  html += `<div class="grid-inner" style="grid-template-columns:repeat(${cols}, ${cellSize}px);grid-auto-rows:${cellSize}px">`;

  for (const line of lines) {
    const chars = [...line.trim()].filter(c => c !== ' ');
    // 每行补齐到 cols 的倍数（但不跨行）
    const filledCount = Math.ceil(chars.length / cols) * cols;
    for (let i = 0; i < filledCount; i++) {
      const ch = i < chars.length ? chars[i] : '';
      const py = state.pinyin && ch ? getPinyin(ch) : '';
      const fontSize = Math.round(cellSize * coef);
      const pySize = Math.round(fontSize * 0.25);
      html += `<div class="${cellClass}" style="width:${cellSize}px;height:${cellSize}px">`;
      html += `<div class="cell-inner">`;
      if (state.pinyin) {
        html += `<span class="cell-pinyin" style="font-size:${pySize}px;min-height:14px;${state.trace?'color:rgba(0,0,0,.12)':''}">${py}</span>`;
      }
      html += `<span class="cell-text" style="font-size:${fontSize}px;font-family:${state.font};color:${state.trace?'rgba(0,0,0,.15)':'#222'}">${ch}</span>`;
      html += `</div></div>`;
    }
  }

  html += '</div>';
  grid.innerHTML = html;
}

// ==================== 重置 ====================
function resetAll() {
  state.grid = 'tian';
  state.font = "KaiTi, STKaiti, '楷体', serif";
  state.content = '';
  state.fontSize = 'medium';
  state.cols = 6;
  state.lineColor = 'black';
  state.trace = false;
  state.pinyin = false;
  state.title = '';
  state.zoom = 1;

  document.getElementById('customText').value = '';
  document.getElementById('paperTitle').value = '';
  document.getElementById('contentPreset').value = '';
  document.getElementById('fontSelect').value = "KaiTi, STKaiti, '楷体', serif";

  resetOptGroup('gridOpts', 'tian');
  resetOptGroup('sizeOpts', 'medium');
  resetOptGroup('colsOpts', '6');
  resetOptGroup('lineColorOpts', 'black');
  resetOptGroup('traceOpts', '0');
  resetOptGroup('pinyinOpts', '0');

  applyZoom();
  updatePreview();
}

function resetOptGroup(id, val) {
  const container = document.getElementById(id);
  container.querySelectorAll('.opt').forEach(o => {
    o.classList.toggle('active', o.dataset.v === val);
  });
}

// ==================== 初始化 ====================
applyZoom();
// 默认加载一首诗
document.getElementById('contentPreset').value = 'poem1';
selectPreset();
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>工地排班考勤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px 30px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:320px;width:100%}
.icon{width:64px;height:64px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.icon-text{font-size:32px;font-weight:700;color:#dc2626}
h2{font-size:18px;color:#0f172a;margin-bottom:8px}
p{font-size:13px;color:#64748b;margin-bottom:24px}
button{width:100%;padding:12px;background:#1a4a3f;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><div class="icon-text">!</div></div>
  <h2>网络连接失败</h2>
  <p>请检查网络连接后重试</p>
  <button onclick="location.reload()">重试</button>
</div>
</body>
</html>
